# ============================================================================
# STRUCTURED REQUIREMENT OBJECT (SRO) SCHEMA
# ============================================================================

sro_schema:
  description: |
    The core data model for structured job requirements. This object
    flows through all products: JD Generator, Optimizer, Interview Generator,
    and Candidate Matcher.

  structure:
    id:
      type: string
      format: "sro_{uuid}"

    metadata:
      title: string
      company_context: string
      created_at: datetime
      updated_at: datetime
      version: integer
      status: enum[draft, active, filled, archived]
      source: enum[generated, imported, manual]

    ontology_mapping:
      occupation_code: string  # O*NET code
      neighborhood: string  # From occupation_taxonomy
      role_family: string
      role_level: string
      role_specialization: string

    requirements:
      essential:
        type: array
        items:
          skill:
            name: string
            proficiency: integer[1-5]
            context: string  # How skill is used
          experience:
            domain: string
            min_years: integer
          education:
            level: string
            field: string  # Optional

      preferred:
        type: array
        items: same_as_essential

      bonus:
        type: array
        items: same_as_essential

    context:
      employment_type: string
      work_arrangement: string
      location: string
      compensation:
        salary_range: [min, max]
        equity: string
        bonus: string
      team_size: integer
      reports_to: string

    generated_content:
      job_description: string  # Full JD text
      interview_questions: array
      scoring_rubrics: object

    analytics:  # Populated by JD Optimizer
      posted_to: array[string]
      applications_received: integer
      qualified_applicants: integer
      interviews_conducted: integer
      offers_extended: integer
      hire_made: boolean
      hire_date: datetime
      success_rating: integer[1-5]

# ============================================================================
# CANDIDATE PROFILE OBJECT (CPO) SCHEMA
# ============================================================================

cpo_schema:
  description: |
    Structured representation of a candidate, derived from CV/resume
    parsing and enrichment.

  structure:
    id:
      type: string
      format: "cpo_{uuid}"

    personal:
      name: string
      email: string
      location: string

    ontology_mapping:
      primary_occupation: string  # Best-fit O*NET code
      secondary_occupations: array[string]
      neighborhoods: array[string]

    skills:
      type: array
      items:
        name: string
        proficiency: integer[1-5]
        last_used: date
        years_experience: number
        context: string  # Where/how skill was used

    experience:
      type: array
      items:
        company: string
        title: string
        dates: [start, end]
        duration_months: integer
        description: string
        skills_used: array[string]
        achievements: array[string]

    education:
      type: array
      items:
        institution: string
        degree: string
        field: string
        graduation_date: date

    certifications:
      type: array
      items:
        name: string
        issuer: string
        date: date
        expiry: date

    summary:
      total_years_experience: number
      primary_domain: string
      career_trajectory: enum[ascending, lateral, transitioning]

    matching:
      # Populated when matched against SRO
      sro_id: string
      match_score: float[0-1]
      essential_coverage: float[0-1]
      preferred_coverage: float[0-1]
      gaps: array[string]
      strengths: array[string]

# ============================================================================
# AGENT CONFIGURATION
# ============================================================================

agents:
  cpo_agent:
    name: Chief People Officer Agent
    role: Orchestrator
    description: |
      Master orchestrator that analyzes employer needs, identifies
      relevant ontology neighborhoods, dispatches to specialists,
      and synthesizes outputs.
    responsibilities:
      - Analyze initial employer input
      - Identify relevant neighborhoods
      - Dispatch to specialist agents
      - Identify gaps and ambiguities
      - Generate clarifying questions
      - Synthesize final structured output

  specialist_agents:
    software_specialist:
      neighborhoods: [software_engineering]
      expertise:
        - Programming languages and frameworks
        - System architecture patterns
        - Development methodologies
        - Technical level calibration

    data_specialist:
      neighborhoods: [data_analytics]
      expertise:
        - Data stack (warehouse, ETL, BI)
        - ML/AI pipeline requirements
        - Analytics vs engineering roles
        - Data scale requirements

    design_specialist:
      neighborhoods: [design_creative]
      expertise:
        - Design tools and methods
        - UX vs UI distinctions
        - Portfolio expectations
        - Design process maturity

    product_specialist:
      neighborhoods: [product_management]
      expertise:
        - Product vs project management
        - Technical PM requirements
        - Agile certifications
        - Stakeholder complexity

    marketing_specialist:
      neighborhoods: [marketing_growth]
      expertise:
        - Marketing channels
        - Analytics requirements
        - Content vs performance
        - B2B vs B2C differences

    sales_specialist:
      neighborhoods: [sales_customer_success]
      expertise:
        - Sales methodologies
        - Quota expectations
        - Customer success metrics
        - Enterprise vs SMB

    finance_specialist:
      neighborhoods: [finance_operations]
      expertise:
        - Accounting standards
