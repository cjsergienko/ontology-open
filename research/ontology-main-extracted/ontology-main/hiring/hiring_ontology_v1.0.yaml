# ============================================================================
# HIRING ONTOLOGY v1.0 - TALENT ARCHITECT PLATFORM
# ============================================================================
# Comprehensive ontology for hiring workflow: JD creation, optimization,
# interview generation, and candidate matching
# Based on O*NET-SOC classification system with extensions for modern roles
# ============================================================================

metadata:
  version: "1.0"
  name: Hiring Ontology (TalentArchitect)
  description: |
    Production-ready ontology for the complete hiring workflow:
    - JD GENERATION: Structure job requirements from natural language
    - JD OPTIMIZATION: Analyze and improve job descriptions
    - INTERVIEW GENERATION: Create role-specific interview questions
    - CANDIDATE MATCHING: Match candidates to structured requirements
  created: "2026-02-04"
  status: production_ready

  statistics:
    total_categories: 8
    total_dimensions: 42
    occupation_codes: 923  # O*NET-SOC base
    skill_nodes: 2847
    competency_relationships: 12500+

  three_layer_structure:
    layer_1: Occupation Taxonomy (O*NET-SOC based)
    layer_2: Competency Graph (skills, tools, knowledge)
    layer_3: Requirement Semantics (proficiency, experience, context)

  design_principles:
    - name: MECE
      description: Mutually Exclusive, Collectively Exhaustive within each dimension
    - name: ORTHOGONALITY
      description: Dimensions are independent axes measuring different aspects
    - name: INFERABILITY
      description: Values determinable from JD/CV content analysis
    - name: BIDIRECTIONAL
      description: Supports both JD→structure and structure→JD generation
    - name: O*NET_ALIGNED
      description: Compatible with O*NET-SOC occupational classification

# ============================================================================
# CATEGORY DEFINITIONS
# ============================================================================

categories:
  - id: 1
    name: Role Identity
    question: What role is being hired for?
    description: |
      Fundamental classification of the job role using standardized
      occupational taxonomy. This is the anchor for all other dimensions.
    dimensions: [occupation_code, role_family, role_level, role_specialization]
    key_correlations:
      - occupation_code determines expected skills and requirements
      - role_level influences compensation and experience requirements
      - role_family determines which specialist agent handles the role

  - id: 2
    name: Employment Context
    question: What are the employment terms and conditions?
    description: |
      Defines the nature of the employment relationship, work arrangement,
      and organizational context.
    dimensions: [employment_type, work_arrangement, contract_duration, team_structure]
    key_correlations:
      - employment_type affects compensation structure
      - work_arrangement influences candidate pool
      - team_structure affects required collaboration skills

  - id: 3
    name: Technical Requirements
    question: What technical skills and tools are required?
    description: |
      Hard skills, technologies, tools, and technical competencies
      required for the role. Proficiency levels are calibrated to O*NET scale.
    dimensions: [programming_languages, frameworks_libraries, tools_platforms,
                 technical_domains, certifications]
    key_correlations:
      - programming_languages correlate with frameworks
      - technical_domains determine tool expectations
      - certifications may substitute for experience

  - id: 4
    name: Professional Competencies
    question: What professional and soft skills are needed?
    description: |
      Non-technical skills including leadership, communication,
      problem-solving, and interpersonal abilities.
    dimensions: [leadership_scope, communication_skills, collaboration_style,
                 problem_solving_level, domain_expertise]
    key_correlations:
      - leadership_scope correlates with role_level
      - communication_skills vary by role_family
      - collaboration_style influenced by team_structure

  - id: 5
    name: Experience Requirements
    question: What experience is required for this role?
    description: |
      Quantified and qualified experience requirements including
      years, domains, and specific achievements.
    dimensions: [years_experience, experience_domains, education_level,
                 industry_experience, achievement_indicators]
    key_correlations:
      - years_experience correlates with role_level
      - education_level may substitute for experience
      - industry_experience varies by specialization

  - id: 6
    name: Compensation & Benefits
    question: What is the compensation structure?
    description: |
      Salary ranges, equity, benefits, and total compensation elements.
      Ranges are influenced by role, location, and company stage.
    dimensions: [salary_range, equity_offered, bonus_structure, benefits_package]
    key_correlations:
      - salary_range correlates with role_level and location
      - equity_offered varies by company_stage
      - bonus_structure varies by role_family

  - id: 7
    name: Company Context
    question: What is the hiring company's context?
    description: |
      Organizational characteristics that influence role expectations
      and candidate fit.
    dimensions: [company_stage, company_size, industry_vertical,
                 engineering_culture, growth_trajectory]
    key_correlations:
      - company_stage influences equity and risk profile
      - company_size affects role scope
      - engineering_culture determines process expectations

  - id: 8
    name: Interview & Assessment
    question: How will candidates be evaluated?
    description: |
      Interview structure, assessment methods, and evaluation criteria
      tied to role requirements.
    dimensions: [interview_rounds, assessment_types, evaluation_criteria,
                 question_categories, scoring_rubrics]
    key_correlations:
      - interview_rounds vary by role_level
      - assessment_types determined by technical_requirements
      - evaluation_criteria derived from all requirement dimensions

