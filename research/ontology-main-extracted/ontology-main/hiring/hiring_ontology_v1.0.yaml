  technical_domains:
    id: 12
    category: 3
    value_type: multi

    definition: |
      Technical knowledge domains required for the role.

    question: What technical domains does this role require expertise in?

    values:
      distributed_systems:
        semantics: Design and operation of distributed architectures
        signals: [microservices, scalability, distributed, fault tolerance]

      machine_learning:
        semantics: ML/AI model development and deployment
        signals: [ml, ai, models, training, inference]

      data_engineering:
        semantics: Data pipelines, ETL, and data infrastructure
        signals: [pipelines, etl, data warehouse, data lake]

      security:
        semantics: Application and infrastructure security
        signals: [security, authentication, encryption, compliance]

      performance:
        semantics: Performance optimization and efficiency
        signals: [performance, latency, throughput, optimization]

  certifications:
    id: 13
    category: 3
    value_type: multi

    definition: |
      Professional certifications that are required or preferred.

    question: What certifications are required or preferred?

    common_values:
