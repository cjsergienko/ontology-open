# ============================================================================
# LAYER 3: REQUIREMENT SEMANTICS
# ============================================================================

requirement_semantics:
  description: |
    How requirements are expressed, categorized, and weighted.
    Supports essential/preferred/bonus classification and equivalence rules.

  requirement_types:
    essential:
      description: Must-have requirements, non-negotiable
      weight: 1.0
      matching_threshold: 0.8  # Candidate must meet 80%+ of essential

    preferred:
      description: Important but not required, strong positive signal
      weight: 0.6
      matching_threshold: 0.5

    bonus:
      description: Nice to have, differentiator among qualified candidates
      weight: 0.3
      matching_threshold: 0.0  # No minimum required

  equivalence_rules:
    description: Rules for substituting one qualification for another
    examples:
      - rule: "4 years relevant experience ≈ Bachelor's degree"
        context: technical_roles
      - rule: "2 years industry experience ≈ 1 year at target company's scale"
        context: scaling_experience
      - rule: "AWS certification ≈ 2 years AWS production experience"
        context: cloud_certifications
      - rule: "Open source contributions ≈ side projects ≈ bootcamp portfolio"
        context: demonstrable_work

  experience_mappings:
    entry_level:
      years: "0-2"
      titles: [Junior, Associate, I, Entry]
      typical_requirements:
        essential_skills: 3-5
        preferred_skills: 2-3
        education: bachelor_or_equivalent

    mid_level:
      years: "2-5"
      titles: [Mid, II, Standard]
      typical_requirements:
        essential_skills: 5-8
        preferred_skills: 3-5
        education: bachelor_preferred

    senior:
      years: "5-8"
      titles: [Senior, III, Lead]
      typical_requirements:
        essential_skills: 6-10
        preferred_skills: 4-6
        education: not_required
        achievements: required

    staff:
      years: "8-12"
      titles: [Staff, Principal, IV]
      typical_requirements:
        essential_skills: 8-12
        preferred_skills: 5-8
        scope: cross_team_impact
        achievements: significant

    director_plus:
      years: "10+"
      titles: [Director, VP, Head of, Chief]
      typical_requirements:
        leadership: required
        scope: organizational_impact
        achievements: transformational

# ============================================================================
# DIMENSION DEFINITIONS
# ============================================================================

dimensions:

  # ==========================================================================
  # CATEGORY 1: ROLE IDENTITY
  # ==========================================================================

  occupation_code:
    id: 1
    category: 1
    value_type: single

    definition: |
      The O*NET-SOC occupation code that best matches this role.
      Primary key for occupation taxonomy lookup.

    question: What is the standardized occupation classification for this role?

    classification_signals:
      - Job title keywords and patterns
      - Primary responsibilities described
      - Required skills and tools
      - Industry context

    generation_guidance: |
      Use occupation code to load neighborhood-specific requirements,
      typical skills, and salary ranges. This drives specialist agent selection.

    examples:
      - code: "15-1252.00"
        title: Software Developers
        keywords: [developer, engineer, programmer, coder]
      - code: "15-2051.00"
        title: Data Scientists
        keywords: [data scientist, ml engineer, research scientist]
      - code: "15-1244.00"
        title: Network and Computer Systems Administrators
        keywords: [sysadmin, devops, sre, platform engineer]

  role_family:
    id: 2
    category: 1
    value_type: single

    definition: |
      The functional family this role belongs to, determining which
      specialist agent handles JD generation and optimization.

    question: Which functional area does this role belong to?

    values:
      engineering:
        semantics: Software development, infrastructure, and technical building
        signals: [code, build, develop, engineer, architect, deploy]
        neighborhoods: [software_engineering]

      data:
        semantics: Data engineering, analytics, science, and ML
        signals: [data, analytics, ml, ai, pipeline, warehouse, model]
        neighborhoods: [data_analytics]

      product:
        semantics: Product management, program management, and delivery
        signals: [product, roadmap, backlog, agile, scrum, requirements]
        neighborhoods: [product_management]

      design:
        semantics: UX, UI, product design, and creative
        signals: [design, ux, ui, user experience, prototype, figma]
        neighborhoods: [design_creative]

      marketing:
        semantics: Marketing, growth, content, and go-to-market
        signals: [marketing, growth, seo, content, brand, acquisition]
        neighborhoods: [marketing_growth]

      sales:
        semantics: Sales, business development, and customer success
        signals: [sales, account, revenue, customer success, quota]
        neighborhoods: [sales_customer_success]

      operations:
        semantics: Business operations, finance, and administration
        signals: [operations, finance, accounting, legal, compliance]
        neighborhoods: [finance_operations]

      people:
        semantics: HR, recruiting, and people operations
        signals: [hr, recruiting, talent, people, culture, compensation]
        neighborhoods: [hr_recruiting]

  role_level:
    id: 3
    category: 1
    value_type: single

    definition: |
      Seniority level determining experience expectations, scope of impact,
      and compensation range.

    question: What seniority level is this role?

    values:
      intern:
        semantics: Student or recent graduate, learning-focused
        experience_years: "0"
        scope: task_execution
        typical_titles: [Intern, Co-op, Apprentice]

      entry:
        semantics: Early career, building foundational skills
        experience_years: "0-2"
        scope: individual_tasks
        typical_titles: [Junior, Associate, I, Entry-level]

      mid:
        semantics: Independent contributor, handles typical scenarios
        experience_years: "2-5"
        scope: feature_ownership
        typical_titles: [Mid, II, Developer, Engineer]

      senior:
        semantics: Expert contributor, mentors others, technical leadership
        experience_years: "5-8"
        scope: project_ownership
        typical_titles: [Senior, III, Lead, Tech Lead]

      staff:
        semantics: Cross-team impact, architecture, technical vision
        experience_years: "8-12"
        scope: cross_team_systems
        typical_titles: [Staff, Principal, IV, Architect]

      director:
        semantics: Organizational leadership, strategy, people management
        experience_years: "10+"
        scope: department_strategy
        typical_titles: [Director, Head of, VP]

      executive:
        semantics: Company-wide impact, executive leadership
        experience_years: "15+"
        scope: company_strategy
        typical_titles: [VP, SVP, Chief, C-level]

  role_specialization:
    id: 4
    category: 1
    value_type: single

    definition: |
      Specific focus area within the role family, determining
      specialized skill requirements.

    question: What is the specific specialization for this role?

    examples:
      engineering_specializations:
        - backend
        - frontend
        - fullstack
        - mobile_ios
        - mobile_android
        - devops_sre
        - security
        - embedded
        - ml_platform

      data_specializations:
        - data_engineering
        - data_science
        - ml_engineering
        - analytics
        - bi_reporting
        - research

      design_specializations:
        - ux_research
        - ui_design
        - product_design
        - design_systems
        - brand_design

  # ==========================================================================
  # CATEGORY 2: EMPLOYMENT CONTEXT
  # ==========================================================================

  employment_type:
    id: 5
    category: 2
    value_type: single

    definition: |
      The nature of the employment relationship, affecting benefits,
      commitment, and compensation structure.

    question: What type of employment is being offered?

    values:
      full_time:
        semantics: Standard full-time employee with benefits
        signals: [full-time, permanent, employee, benefits included]
        compensation: salary_plus_equity_plus_benefits

      part_time:
        semantics: Regular but reduced hours employee
        signals: [part-time, reduced hours, flexible schedule]
        compensation: prorated_salary

      contract:
        semantics: Fixed-term engagement with defined scope
        signals: [contract, contractor, consulting, project-based]
        compensation: hourly_or_project_rate

      freelance:
        semantics: Independent work, often project-based
        signals: [freelance, independent, 1099, gig]
        compensation: hourly_or_project_rate

      temp_to_perm:
        semantics: Trial period leading to potential full-time
        signals: [temp-to-perm, contract-to-hire, trial period]
        compensation: contract_with_conversion

  work_arrangement:
    id: 6
    category: 2
    value_type: single

    definition: |
      Where and how the work is performed, affecting candidate
      pool and collaboration expectations.

    question: What is the work location arrangement?

    values:
      remote:
        semantics: Fully remote, no office requirement
        signals: [remote, work from home, distributed, anywhere]
        candidate_pool: global_or_national
        collaboration: async_primary

      hybrid:
        semantics: Mix of remote and office time
        signals: [hybrid, flexible, 2-3 days in office]
        candidate_pool: commutable_distance
        collaboration: mixed_sync_async

      onsite:
        semantics: Full-time office presence required
        signals: [onsite, in-office, on-premises]
        candidate_pool: local_only
        collaboration: sync_primary

      flexible:
        semantics: Employee choice of arrangement
        signals: [flexible, your choice, office optional]
        candidate_pool: varies
        collaboration: adaptable

  contract_duration:
    id: 7
    category: 2
    value_type: single

    definition: |
      Length of engagement for non-permanent roles.

    question: What is the expected duration of this engagement?

    values:
      permanent:
        semantics: Indefinite, ongoing employment
        signals: [permanent, ongoing, long-term]

      fixed_term:
        semantics: Specific end date
        signals: [6 months, 12 months, fixed term, ends on]

      project_based:
        semantics: Until project completion
        signals: [project, deliverable-based, until completion]

      open_ended_contract:
        semantics: Contract renewable without fixed end
        signals: [renewable, rolling contract]

  team_structure:
    id: 8
    category: 2
    value_type: single

    definition: |
      The team configuration this role will be part of.

    question: What is the team structure for this role?

    values:
      individual:
        semantics: Solo role, no immediate team
        signals: [sole, only, first hire, founding]

      small_team:
        semantics: Team of 2-5 people
        signals: [small team, lean team, startup team]

      medium_team:
        semantics: Team of 6-15 people
        signals: [growing team, established team]

      large_team:
        semantics: Team of 15+ people
        signals: [large team, multiple squads]

      cross_functional:
        semantics: Works across multiple teams
        signals: [cross-functional, embedded, matrix]

  # ==========================================================================
  # CATEGORY 3: TECHNICAL REQUIREMENTS
  # ==========================================================================

  programming_languages:
    id: 9
    category: 3
    value_type: multi

    definition: |
      Programming languages required or preferred for the role.
      Each language has an associated proficiency level (1-5).

    question: What programming languages are required?

    generation_guidance: |
      Look up language in competency graph for related frameworks,
      typical complements, and potential substitutes.

    common_values:
      - python
      - javascript
      - typescript
      - java
      - go
      - rust
      - cpp
      - csharp
      - ruby
      - php
      - swift
      - kotlin
      - scala
      - r
      - sql

  frameworks_libraries:
    id: 10
    category: 3
    value_type: multi

    definition: |
      Software frameworks and libraries required or preferred.

    question: What frameworks and libraries are required?

    common_values:
      frontend: [react, vue, angular, svelte, nextjs]
      backend: [django, flask, fastapi, spring, express, rails]
      data: [pandas, numpy, spark, dbt, airflow]
