      onet_range: "15-1250 to 15-1299"
      description: Software development, DevOps, and related engineering roles
      example_roles:
        - Backend Developer
        - Frontend Developer
        - Full-Stack Engineer
        - DevOps Engineer
        - Site Reliability Engineer
        - ML Engineer
        - Mobile Developer
      specialist_agent: software_specialist

