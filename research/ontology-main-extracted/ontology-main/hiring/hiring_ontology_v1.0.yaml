competency_graph:
  description: |
    Skills, tools, knowledge areas, and their relationships. Each node
    has proficiency levels (1-5) calibrated to O*NET scale.

  proficiency_scale:
    1:
      label: Novice
      description: Basic awareness, requires supervision
      experience_equivalent: "0-1 years"
    2:
      label: Beginner
      description: Can perform basic tasks independently
      experience_equivalent: "1-2 years"
    3:
      label: Intermediate
      description: Competent, handles typical scenarios
      experience_equivalent: "2-4 years"
    4:
      label: Advanced
      description: Expert in most scenarios, can mentor others
      experience_equivalent: "4-7 years"
    5:
      label: Expert
      description: Mastery, drives innovation, industry recognition
      experience_equivalent: "7+ years"

  skill_categories:
    programming_languages:
      description: Programming and scripting languages
      examples:
        python:
          related: [data_science, machine_learning, backend_development]
          substitutes: [r, julia]  # For data science contexts
          prerequisites: []
          complements: [sql, pandas, numpy]
        javascript:
          related: [frontend_development, nodejs, web_development]
          substitutes: [typescript]
          prerequisites: []
          complements: [react, vue, angular]
        sql:
          related: [data_engineering, analytics, backend_development]
          substitutes: []
          prerequisites: []
          complements: [python, dbt, airflow]
        java:
          related: [backend_development, enterprise, android]
          substitutes: [kotlin, scala]
          prerequisites: []
          complements: [spring, maven, gradle]
        go:
          related: [backend_development, infrastructure, microservices]
          substitutes: [rust]
          prerequisites: []
          complements: [kubernetes, docker, grpc]
        rust:
          related: [systems_programming, performance, security]
          substitutes: [cpp, go]
          prerequisites: [cpp_fundamentals]
          complements: [webassembly, embedded]

    frameworks_libraries:
      description: Software frameworks and libraries
      examples:
        react:
          related: [frontend_development, javascript]
          substitutes: [vue, angular, svelte]
          prerequisites: [javascript]
          complements: [redux, nextjs, typescript]
        django:
          related: [backend_development, python, web_development]
          substitutes: [flask, fastapi]
          prerequisites: [python]
          complements: [postgresql, celery, redis]
        spring:
          related: [backend_development, java, enterprise]
          substitutes: [quarkus, micronaut]
          prerequisites: [java]
          complements: [maven, gradle, kubernetes]
        pytorch:
          related: [machine_learning, deep_learning, python]
          substitutes: [tensorflow, jax]
          prerequisites: [python, linear_algebra]
          complements: [numpy, cuda, huggingface]
        dbt:
          related: [data_engineering, analytics_engineering, sql]
          substitutes: []
          prerequisites: [sql]
          complements: [snowflake, bigquery, airflow]

    tools_platforms:
      description: Development tools, platforms, and infrastructure
      examples:
        aws:
          related: [cloud_infrastructure, devops]
          substitutes: [gcp, azure]
          prerequisites: []
          complements: [terraform, kubernetes, docker]
          certifications: [aws_solutions_architect, aws_developer]
        kubernetes:
          related: [container_orchestration, devops, infrastructure]
          substitutes: [docker_swarm, nomad]
          prerequisites: [docker, linux]
          complements: [helm, istio, prometheus]
          certifications: [cka, ckad]
