# ============================================================================
# HIRING SKILLS TAXONOMY v1.0 - COMPETENCY GRAPH
# ============================================================================
# Comprehensive taxonomy of skills, tools, and competencies for hiring
# With relationships, proficiency levels, and substitution rules
# ============================================================================

metadata:
  version: "1.0"
  name: Hiring Skills Taxonomy (Competency Graph)
  description: |
    Detailed taxonomy of technical and professional skills used in hiring:
    - CLASSIFICATION: Identify skills from JD/CV content
    - MATCHING: Calculate skill overlap and gaps
    - GENERATION: Suggest related skills and requirements
    - INTERVIEW: Map skills to assessment questions
  created: "2026-02-04"
  status: production_ready

  statistics:
    total_skill_categories: 12
    total_skills: 450+
    relationship_types: 4
    proficiency_levels: 5

  proficiency_scale:
    1:
      label: Novice
      description: Basic awareness, requires supervision
      jd_language: ["familiar with", "exposure to", "basic knowledge"]
      cv_indicators: ["learning", "coursework", "some experience"]
    2:
      label: Beginner
      description: Can perform basic tasks independently
      jd_language: ["working knowledge", "foundational", "1-2 years"]
      cv_indicators: ["junior", "assisted", "contributed to"]
    3:
      label: Intermediate
      description: Competent, handles typical scenarios
      jd_language: ["proficient", "solid experience", "3-4 years"]
      cv_indicators: ["implemented", "developed", "built"]
    4:
      label: Advanced
      description: Expert in most scenarios, can mentor others
      jd_language: ["strong", "expert", "deep experience", "5+ years"]
      cv_indicators: ["led", "architected", "designed", "senior"]
    5:
      label: Expert
      description: Mastery, drives innovation, industry recognition
      jd_language: ["world-class", "industry leader", "thought leader"]
      cv_indicators: ["pioneered", "invented", "published", "spoke at"]

  relationship_types:
    requires:
      description: Skill A requires Skill B as prerequisite
      example: "React requires JavaScript"
    substitutes:
      description: Skill A can substitute for Skill B in some contexts
      example: "Vue substitutes for React"
    complements:
      description: Skill A is commonly used with Skill B
      example: "Python complements SQL"
    specializes:
      description: Skill A is a specialization of Skill B
      example: "PyTorch specializes Machine Learning"

