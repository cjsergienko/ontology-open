        typography_style: elegant_thin
        urgency_level: none, soft
        tone_of_voice: exclusive_vip
        color_palette: neutral_palette


  expected_correlations:
    email_type_body_sections:
      type: deterministic_base
      description: |
        email_type determines MINIMUM required sections; body_sections captures 
        all sections including optional. This is expected correlation, not redundancy.
      independence_preserved: true
      reason: "body_sections can include MORE sections than email_type requires"

    brand_personality_tone_of_voice:
      type: constraint
      description: |
        brand_personality constrains allowable tone_of_voice values. 
        This is a valid constraint relationship, not redundancy.
      mappings:
        playful_fun: [playful_fun, witty_clever, casual_conversational]
        professional_polished: [formal_professional, professional_friendly]
        luxurious_premium: [exclusive_vip, sophisticated_refined]
        bold_edgy: [bold_provocative, confident_assertive]
        authentic_genuine: [friendly_warm, empathetic_understanding]

    market_position_design_aesthetic:
      type: soft_correlation
      description: |
        market_position influences typical design_aesthetic choices.
        Exceptions allowed with explicit justification.
      typical_mappings:
        luxury: [elegant_sophisticated, luxurious_premium, minimalist]
        premium: [clean_modern, editorial_elegant]
        value: [bold_energetic, promotional]
        budget: [functional, high_density]

  # Generation validation rules
  validation_rules:

    - name: Urgency Consistency
      rule: |
        If urgency_level is high or extreme, then:
        - tone_of_voice should be urgent_time_sensitive
        - body_sections should include countdown_timer or limited_stock
        - cta_style should include urgency elements

    - name: Brand Personality Consistency
      rule: |
        brand_personality constrains tone_of_voice options:
        - playful_fun → playful_fun, witty_clever
        - professional_polished → formal_professional
        - luxurious_premium → exclusive_vip

    - name: Mobile Optimization Consistency
      rule: |
        If mobile_optimization is mobile_first, then:
        - layout_structure should be single_column variants
        - cta_style should use large_centered

    - name: Funnel Stage Consistency
      rule: |
        funnel_stage influences appropriate social_proof_type:
        - awareness → media_mentions, awards_recognition
        - consideration → testimonial_quote, case_study
        - intent → star_ratings, user_count


  # Constraint rules enforce business logic and regulatory compliance
  constraint_rules:

    # Industry-Specific Constraints (5 rules)
    - id: constraint_001
      name: "Finance Compliance Constraint"
      description: "Finance industry emails must maintain formal professional tone and cannot use extreme urgency"
      conditions:
        required_when:
          industry: [finance, fintech, banking, insurance]
        allowed_values:
          tone_of_voice: [formal_professional, informative_neutral]
          urgency_level: [none, soft, moderate]
        forbidden_values:
          urgency_level: [high, extreme]
      severity: error
      remediation: "Change tone to formal_professional/informative_neutral and reduce urgency to soft/moderate for finance emails"

    - id: constraint_002
      name: "Healthcare Compliance Constraint"
      description: "Healthcare emails cannot contain unsupported claims and must include privacy disclaimers"
      conditions:
        required_when:
          industry: [healthcare, pharmaceutical, medical, wellness]
        required_sections:
          body_sections: [privacy_disclaimer]
          footer_style: [legal_compliance]
        forbidden_values:
          social_proof_type: [fake_testimonial, unverified_claims]
      severity: error
      remediation: "Add privacy disclaimer to body_sections and footer_style, remove unverified claims from social_proof_type"

    - id: constraint_003
      name: "Luxury No Discount Constraint"
      description: "Luxury market position cannot include discount offer email types"
      conditions:
        required_when:
          market_position: [luxury, premium, high_end]
        forbidden_combinations:
          - email_type: [discount_offer, flash_sale, clearance]
      severity: warning
      remediation: "Replace discount_offer email type with exclusive_access, vip_preview, or limited_edition for luxury positioning"

    - id: constraint_004
      name: "B2B Tone Constraint"
      description: "B2B business model requires professional tone variants"
      conditions:
        required_when:
          business_model: [b2b, b2b2c]
        required_values:
          tone_of_voice: [formal_professional, informative_neutral, consultative_advisory]
        forbidden_values:
          tone_of_voice: [playful_fun, witty_clever, casual_friendly]
      severity: error
      remediation: "Select professional tone variant (formal_professional, informative_neutral, or consultative_advisory) for B2B emails"

    - id: constraint_005
      name: "Nonprofit Goal Constraint"
      description: "Nonprofit organizations cannot have drive_purchase as primary campaign goal"
      conditions:
        required_when:
          business_model: [nonprofit, ngo, charity]
        forbidden_values:
          campaign_goal: [drive_purchase]
      severity: error
      remediation: "Change campaign_goal to drive_donation, build_community, raise_awareness, or educate for nonprofit emails"

    # Email Type Constraints (10 rules)
    - id: constraint_006
      name: "Transactional Urgency Constraint"
      description: "Transactional emails cannot use extreme urgency levels"
      conditions:
        required_when:
          email_type: [transactional, receipt, invoice, password_reset, confirmation]
        forbidden_values:
          urgency_level: [extreme]
      severity: warning
      remediation: "Reduce urgency_level to none, soft, or moderate for transactional email types"

    - id: constraint_007
      name: "Abandoned Cart Personalization Constraint"
      description: "Abandoned cart emails require advanced personalization level"
      conditions:
        required_when:
          email_type: [abandoned_cart]
        required_values:
          personalization_level: [advanced, hyper_personalized]
      severity: error
      remediation: "Set personalization_level to advanced or hyper_personalized for abandoned_cart emails"

    - id: constraint_008
      name: "Password Reset Brevity Constraint"
      description: "Password reset emails must use ultra_short or brief copy length"
      conditions:
        required_when:
          email_type: [password_reset]
        required_values:
          copy_length: [ultra_short, brief]
      severity: error
      remediation: "Set copy_length to ultra_short or brief for password_reset emails"

    - id: constraint_009
      name: "Invoice Tone Constraint"
      description: "Invoice emails require formal_professional tone"
      conditions:
        required_when:
          email_type: [invoice]
        required_values:
          tone_of_voice: [formal_professional]
      severity: error
      remediation: "Set tone_of_voice to formal_professional for invoice emails"

    - id: constraint_010
      name: "Flash Sale Countdown Constraint"
      description: "Flash sale emails must include countdown timer in body sections"
      conditions:
        required_when:
          email_type: [flash_sale]
        required_sections:
          body_sections: [countdown_timer]
      severity: error
      remediation: "Add countdown_timer to body_sections for flash_sale emails"

    - id: constraint_011
      name: "Welcome Email Urgency Constraint"
      description: "Welcome emails cannot use high or extreme urgency levels"
      conditions:
        required_when:
          email_type: [welcome]
        forbidden_values:
          urgency_level: [high, extreme]
      severity: warning
      remediation: "Reduce urgency_level to none or soft for welcome emails to maintain positive first impression"

    - id: constraint_012
      name: "Apology No Promotion Constraint"
      description: "Apology emails cannot include promotional body sections like discount banners"
      conditions:
        required_when:
          email_type: [apology]
        forbidden_sections:
          body_sections: [discount_banner, promotional_content, limited_offer]
      severity: error
      remediation: "Remove promotional sections from apology emails; focus on sincere communication"

    - id: constraint_013
      name: "Receipt Minimal Constraint"
      description: "Receipt emails must use minimal design with no promotional content"
      conditions:
        required_when:
          email_type: [receipt]
        required_values:
          design_aesthetic: [minimal_clean, minimal_functional]
          visual_density: [ultra_minimal, sparse]
        forbidden_sections:
          body_sections: [promotional_content, discount_banner, upsell]
      severity: error
      remediation: "Use minimal design aesthetic and remove promotional sections from receipt emails"

    - id: constraint_014
      name: "Shipping Tracking Constraint"
      description: "Shipping notification emails require tracking information sections"
      conditions:
        required_when:
          email_type: [shipping_notification]
        required_sections:
          body_sections: [tracking_number, order_details]
      severity: error
      remediation: "Add tracking_number and order_details to body_sections for shipping_notification emails"

    - id: constraint_015
      name: "Booking Details Constraint"
      description: "Booking confirmation emails require date/time/location in body sections"
      conditions:
        required_when:
          email_type: [booking_confirmation]
        required_sections:
          body_sections: [event_details, date_time_location, confirmation_code]
      severity: error
      remediation: "Add event_details, date_time_location, and confirmation_code to body_sections"

    # Audience Coherence Constraints (5 rules)
    - id: constraint_016
      name: "Age Profession Coherence Constraint"
      description: "Teens audience cannot be targeted with executive or C-suite professional audiences"
      conditions:
        required_when:
          audience_age_group: [teens_13_19]
        forbidden_values:
          audience_profession: [executives, c_suite, executive_leadership]
      severity: error
      remediation: "Align audience_profession with appropriate roles for teens (students, entry_level, interns)"

    - id: constraint_017
      name: "Life Stage Age Coherence Constraint"
      description: "Retirees audience cannot be targeted with young adult age group"
      conditions:
        required_when:
          audience_life_stage: [retirees, empty_nesters]
        forbidden_values:
          audience_age_group: [adults_18_24]
      severity: error
      remediation: "Select audience_age_group from adults_55_plus or maintain consistency with retirees life stage"

    - id: constraint_018
      name: "Sophistication Psychographic Coherence Constraint"
      description: "Basic sophistication level cannot include connoisseurs psychographic"
      conditions:
        required_when:
          audience_sophistication: [basic, novice]
        forbidden_values:
          audience_psychographic: [connoisseurs, enthusiasts_experts]
      severity: warning
      remediation: "Select audience_psychographic aligned with basic sophistication (mass_market, value_seekers)"

    - id: constraint_019
      name: "Relationship Personalization Constraint"
      description: "New subscriber relationship cannot have hyper-personalized personalization level"
      conditions:
        required_when:
          relationship_stage: [new_subscriber, cold_prospect]
        forbidden_values:
          personalization_level: [hyper_personalized]
        allowed_values:
          personalization_level: [none, basic, moderate]
      severity: warning
      remediation: "Use basic or moderate personalization for new subscribers; reserve hyper_personalized for established relationships"

    - id: constraint_020
      name: "B2B Audience Tone Constraint"
      description: "B2B target audiences require formal or consultative tone variants"
      conditions:
        required_when:
          business_model: [b2b]
          audience_profession: [executives, c_suite, managers, business_owners]
        required_values:
          tone_of_voice: [formal_professional, consultative_advisory, informative_neutral]
      severity: error
      remediation: "Use formal_professional, consultative_advisory, or informative_neutral tone for B2B executive audiences"


