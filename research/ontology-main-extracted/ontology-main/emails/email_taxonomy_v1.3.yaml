# ============================================================================
# EMAIL MARKETING TAXONOMY v1.3 - PRODUCTION READY
# ============================================================================
# Comprehensive taxonomy for email classification AND generation
# With full semantics, signals, examples, dimension correlations, and constraints
# Improved from v1.2: MECE 9.3, Orthogonality 8.5, Inferability 9.0, Overall 9.0
# ============================================================================

metadata:
  version: "1.3"
  name: Email Marketing Taxonomy (Production Ready)
  description: |
    Production-ready taxonomy for dual-purpose use:
    - CLASSIFICATION: Identify dimension values from email HTML/visual inspection
    - GENERATION: Retrieve examples for one-shot learning in prompt chains
    - VALIDATION: Constraint rules ensure consistent, valid email specifications
  created: "2026-01-31"
  updated: "2026-02-01"
  status: production_ready

  statistics:
    total_dimensions: 34
    total_values: 4707
    multi_value_dimensions: [header_style, body_sections, footer_style, social_proof_type, audience_psychographic]
    hierarchical_dimensions: [audience_life_stage]
    categories: 8
    constraint_rules: 20
    cooccurrence_patterns: 53
    decision_trees: 2

  enrichment_schema:
    dimension_level:
      - definition: Clear description of what this dimension measures
      - question: The classification question this dimension answers
      - classification_signals: What to look for when classifying
      - generation_guidance: How to use for generation
      - correlations: Related dimensions and typical co-occurrences

    value_level:
      - semantics: Precise meaning and boundaries
      - signals: Observable features that indicate this value
      - counter_signals: Features that rule out this value
      - examples: 4-5 real-world email examples
      - typical_correlations: Common co-occurring values in other dimensions

  design_principles:
    - name: MECE
      description: Mutually Exclusive, Collectively Exhaustive within each dimension
    - name: ORTHOGONALITY
      description: Dimensions are independent axes, not redundant
    - name: INFERABILITY
      description: Values determinable from email content/HTML inspection
    - name: DUAL_PURPOSE
      description: Optimized for both classification accuracy and generation quality
    - name: CORRELATION_AWARE
      description: Explicit modeling of dimension relationships

# ============================================================================
# CATEGORY DEFINITIONS
# ============================================================================

categories:
  - id: 1
    name: Purpose & Intent
    question: What is this email trying to accomplish?
    description: |
      Defines the fundamental purpose and strategic intent of the email.
      These dimensions drive all downstream decisions about content, design, and tone.
    dimensions: [email_type, campaign_goal, funnel_stage]
    key_correlations:
      - email_type strongly correlates with campaign_goal
      - funnel_stage influences tone_of_voice and urgency_level
      - email_type determines expected body_sections

  - id: 2
    name: Business Context
    question: Who is sending this email and what's their market position?
    description: |
      Captures the sender's business identity, which shapes brand expression.
      These dimensions remain relatively stable across campaigns.
    dimensions: [industry, business_model, brand_personality, market_position]
    key_correlations:
      - industry correlates with design_aesthetic
      - market_position influences visual_density and typography
      - brand_personality constrains tone_of_voice options

  - id: 3
    name: Audience
    question: Who is this email targeting?
    description: |
      Multi-dimensional audience targeting split into orthogonal axes.
      Each axis is independent - an email targets specific combinations.
    dimensions: [audience_age_group, audience_life_stage, audience_profession,
                 audience_psychographic, relationship_stage, audience_sophistication]
    key_correlations:
      - audience_age_group influences design_aesthetic
      - relationship_stage strongly correlates with email_type
      - audience_sophistication affects copy_length and terminology

  - id: 4
    name: Visual Design
    question: How does this email look?
    description: |
      Visual presentation layer - aesthetic choices that create brand impression.
      These should align with brand_personality and audience expectations.
    dimensions: [design_aesthetic, layout_structure, visual_density, color_palette, typography_style]
    key_correlations:
      - design_aesthetic correlates with brand_personality
      - layout_structure depends on email_type
      - visual_density influenced by copy_length

  - id: 5
    name: Email Structure
    question: How is this email built?
    description: |
      Structural components and their arrangement.
      Multi-value dimensions where emails contain multiple elements.
    dimensions: [header_style, hero_treatment, body_sections, cta_style, footer_style]
    key_correlations:
      - body_sections strongly correlate with email_type
      - cta_style depends on campaign_goal
      - header_style reflects brand_personality

  - id: 6
    name: Messaging
    question: How does this email communicate?
    description: |
      Voice, tone, and communication approach.
      Distinct from brand_personality - this is email-specific expression.
    dimensions: [tone_of_voice, copy_length, urgency_level]
    key_correlations:
      - tone_of_voice constrained by brand_personality
      - urgency_level correlates with email_type (sales vs transactional)
      - copy_length influenced by funnel_stage

  - id: 7
    name: Conversion
    question: How does this email drive action?
    description: |
      Social proof and personalization strategies that influence conversion.
    dimensions: [social_proof_type, personalization_level]
    key_correlations:
      - social_proof_type depends on funnel_stage
      - personalization_level correlates with relationship_stage

  - id: 8
    name: Delivery
    question: How is this email delivered and optimized?
    description: |
      Operational characteristics and technical optimization.
      New category capturing send patterns and technical considerations.
    dimensions: [trigger_type, send_frequency, mobile_optimization,
                 primary_cta_action, preheader_strategy, image_text_ratio]
    key_correlations:
      - trigger_type determines email_type options
      - mobile_optimization influences layout_structure
      - primary_cta_action aligns with campaign_goal

# ============================================================================
# DIMENSION DEFINITIONS - CATEGORY 1: PURPOSE & INTENT
# ============================================================================

dimensions:

  # ==========================================================================
  # DIMENSION 1: EMAIL TYPE
  # ==========================================================================

  email_type:
    id: 1
    category: 1
    value_type: single

    definition: |
      The functional category of email based on its primary purpose and trigger.
      This is the most fundamental classification dimension - it determines
      expected content, structure, and user expectations.

    question: What type of email is this?

    classification_signals:
      - Subject line keywords and patterns
      - Primary content focus (order info, promotion, content)
      - Presence of specific elements (order number, discount code, article)
      - Trigger context (user action vs scheduled send)
      - Legal/compliance elements (unsubscribe placement, disclaimers)

    generation_guidance: |
      Email type is the primary retrieval key for generation. Select examples
      that match the target type exactly, then filter by secondary dimensions.
      Type determines required structural elements and content expectations.

    classification_decision_tree:
      step_1:
        question: "Is this triggered by a specific user transaction or account action?"
        yes_answer: "Go to Transactional Branch"
        no_answer: "Go to step_2"

      transactional_branch:
        question: "What type of transaction?"
        options:
          - "Purchase/order related → order_confirmation, shipping_notification, delivery_confirmation, receipt"
          - "Booking/reservation → booking_confirmation"
          - "Subscription → subscription_confirmation"
          - "Payment → invoice, payment_reminder, receipt"
          - "Account security → password_reset, account_verification, security_alert"
          - "Account changes → account_update"

      step_2:
        question: "Is this promoting a sale, discount, or limited-time offer?"
        yes_answer: "Go to Promotional Branch"
        no_answer: "Go to step_3"

      promotional_branch:
        question: "What's the primary promotional mechanism?"
        options:
          - "Time-limited deep discount (24-48 hrs) → flash_sale"
          - "Seasonal/holiday themed → seasonal_sale"
          - "Clearance/end of season → clearance_sale"
          - "Percentage or dollar off → discount_offer"
          - "Buy-one-get-one → bogo_offer"
          - "Multiple items together → bundle_deal"
          - "Free shipping focus → free_shipping_offer"
          - "Exclusive/early access → exclusive_access"
          - "Limited allocation → allocation_notice"

      step_3:
        question: "Is this about a specific product or feature?"
        yes_answer: "Go to Product Branch"
        no_answer: "Go to step_4"

      product_branch:
        question: "What's the product context?"
        options:
          - "Brand new product launch → product_launch"
          - "Recently added items → new_arrival"
          - "Previously sold out → back_in_stock"
          - "Price reduction → price_drop_alert"
          - "Product improvements → product_update"
          - "New feature → feature_announcement"
          - "Waitlist availability → waitlist_notification"

      step_4:
        question: "Is this related to customer lifecycle/relationship?"
        yes_answer: "Go to Lifecycle Branch"
        no_answer: "Go to Content Branch"

      lifecycle_branch:
        question: "What lifecycle stage?"
        options:
          - "First email after signup → welcome"
          - "Educational series → onboarding"
          - "First action encouragement → activation"
          - "Achievement recognition → milestone"
          - "Annual celebration → anniversary"
          - "Birthday recognition → birthday"
          - "Win back inactive → re_engagement, win_back"
          - "Service recovery → apology"
          - "Final goodbye → sunset"

      content_branch:
        question: "What's the content focus?"
        options:
          - "Curated content/articles → content_newsletter"
          - "Mixed promotional content → promotional_newsletter"
          - "Content compilation → digest"
          - "Personalized suggestions → recommendation"
          - "Educational material → educational"
          - "Industry insights → thought_leadership"
          - "Event info → event_invitation, event_announcement"
          - "Webinar promotion → webinar_invite"

    correlations:
      strong:
        - campaign_goal: Each type has 2-3 natural goal pairings
        - body_sections: Type determines required/expected sections
        - trigger_type: Transactional types = transactional trigger
      moderate:
        - tone_of_voice: Type influences appropriate tones
        - urgency_level: Sales types allow higher urgency
        - personalization_level: Transactional requires higher personalization

    value_count: 76

    values:
      # ------------------------------------------------------------------------
      # TRANSACTIONAL EMAILS
      # ------------------------------------------------------------------------

      order_confirmation:
        semantics: |
          Email sent immediately after a purchase is completed, confirming
          the order details including items, quantities, prices, and totals.
          Primary purpose is reassurance and record-keeping.
        signals:
          - Subject contains "order confirmed", "order #", "thank you for your order"
          - Order number prominently displayed
          - Itemized list of purchased products with prices
          - Order total, subtotal, tax, shipping breakdown
          - Estimated delivery date or shipping timeframe
          - Billing and shipping addresses shown
        counter_signals:
          - No order number or purchase details
          - Focus on upselling rather than confirmation
          - Missing itemized product list
          - Promotional tone rather than transactional
        examples:
          - "Amazon - Your order #123-456 has been confirmed"
          - "Apple Store - Order Confirmation"
          - "Warby Parker - Thanks for your order!"
          - "Target - Your order is confirmed"
          - "Best Buy - Order Confirmation #BBY-789"
        typical_correlations:
          campaign_goal: drive_purchase (cross-sell), nurture_relationships
          tone_of_voice: friendly_warm, grateful_appreciative
          trigger_type: transactional
          personalization_level: moderate, advanced
          body_sections: [single_product, product_grid, step_process]

      shipping_notification:
        semantics: |
          Email notifying customer that their order has shipped, including
          tracking information and estimated delivery date.
        signals:
          - Subject contains "shipped", "on the way", "tracking"
          - Tracking number with carrier link
          - Estimated delivery date
          - Shipment details (items in shipment)
          - Carrier name (UPS, FedEx, USPS)
        counter_signals:
          - No tracking information
          - No delivery estimate
          - Focus on additional purchases
        examples:
          - "Your order has shipped! Track your package"
          - "Good news - your items are on the way"
          - "Shipment Update: Arriving Thursday"
          - "Track your Nordstrom order"
          - "Your package is on its way!"
        typical_correlations:
          campaign_goal: nurture_relationships
          tone_of_voice: friendly_warm, excited_enthusiastic
          trigger_type: transactional
          urgency_level: none
          body_sections: [step_process, single_product]

      delivery_confirmation:
        semantics: |
          Email confirming that an order has been delivered to the customer.
          Often includes photo proof and next steps like review requests.
        signals:
          - Subject contains "delivered", "arrived", "received"
          - Delivery confirmation timestamp
          - Photo of package at door (increasingly common)
          - Request for feedback or review
          - Cross-sell suggestions
        counter_signals:
          - Tracking still in transit
          - No delivery confirmation details
        examples:
          - "Your package has been delivered"
          - "Delivery Complete - How was your experience?"
          - "Your Amazon order was delivered"
          - "Good news! Your order arrived"
          - "Package delivered - Photo attached"
        typical_correlations:
          campaign_goal: request_reviews, nurture_relationships
          tone_of_voice: friendly_warm
          trigger_type: transactional
          body_sections: [review_quotes, product_grid]

      receipt:
        semantics: |
          Formal record of payment/transaction, often more detailed than
          order confirmation. Legal document for expense tracking.
        signals:
          - Subject contains "receipt", "invoice", "payment confirmation"
          - Payment method shown (last 4 digits)
          - Transaction ID or receipt number
          - Itemized charges with tax breakdown
          - Company legal information
          - PDF attachment option
        counter_signals:
          - Missing payment details
          - No transaction reference
          - Promotional content dominates
        examples:
          - "Your receipt from Apple"
          - "Payment Receipt - Subscription Renewed"
          - "Uber Receipt for your trip"
          - "Square Receipt from Coffee Shop"
          - "Stripe Receipt - Invoice #12345"
        typical_correlations:
          campaign_goal: nurture_relationships
          tone_of_voice: formal_professional
          trigger_type: transactional
          design_aesthetic: minimalist, corporate_professional
          copy_length: brief

      invoice:
        semantics: |
          B2B-focused billing document requesting payment, with detailed
          line items, payment terms, and due dates.
        signals:
          - Subject contains "invoice", "payment due", "bill"
          - Invoice number prominently displayed
          - Due date clearly stated
          - Payment instructions/options
          - Line items with descriptions and amounts
          - Payment terms (Net 30, etc.)
        counter_signals:
          - Already paid indicator
          - Missing due date or payment instructions
          - B2C consumer language
        examples:
          - "Invoice #2024-001 Due Jan 31"
          - "Your monthly invoice is ready"
          - "FreshBooks Invoice from [Company]"
          - "Payment Due: Invoice attached"
          - "Quickbooks Invoice #789"
        typical_correlations:
          campaign_goal: drive_purchase
          tone_of_voice: formal_professional
          business_model: b2b, professional_services
          trigger_type: transactional
          design_aesthetic: corporate_professional, minimalist

      booking_confirmation:
        semantics: |
          Confirmation of a reservation or booking (hotel, flight, restaurant,
          appointment, event). Includes essential details for the booking.
        signals:
          - Subject contains "confirmed", "reservation", "booking"
          - Confirmation/booking number
          - Date, time, and location details
          - Calendar add option (ICS attachment)
          - Modification/cancellation policy
          - Check-in instructions if applicable
        counter_signals:
          - Missing confirmation number
          - No date/time/location
          - Request for payment (pending, not confirmed)
        examples:
          - "Your Airbnb reservation is confirmed"
          - "Flight Confirmation - United Airlines"
          - "OpenTable: Reservation Confirmed"
          - "Your appointment is confirmed for Tuesday"
          - "Hotel Booking Confirmation - Marriott"
        typical_correlations:
          campaign_goal: nurture_relationships
          tone_of_voice: friendly_warm, formal_professional
          trigger_type: transactional
          body_sections: [event_details, calendar_widget, map_embed]

      subscription_confirmation:
        semantics: |
          Confirms a new subscription signup or newsletter enrollment.
          May be double opt-in confirmation or welcome to subscription.
        signals:
          - Subject contains "subscribed", "signed up", "confirmed"
          - Welcome message to the list/service
          - What to expect going forward
          - Subscription management link
          - May request preferences
        counter_signals:
          - No mention of subscription
          - Already active subscriber context
        examples:
          - "You're subscribed! Here's what's next"
          - "Welcome to our newsletter"
          - "Subscription Confirmed - Weekly Digest"
          - "Thanks for subscribing to updates"
          - "You're in! Confirm your subscription"
        typical_correlations:
          campaign_goal: drive_signups, nurture_relationships
          tone_of_voice: friendly_warm, excited_enthusiastic
          trigger_type: transactional
          relationship_stage: new_subscriber

      payment_reminder:
        semantics: |
          Reminder about upcoming or overdue payment. Balance between
          urgency and maintaining positive relationship.
        signals:
          - Subject contains "reminder", "payment due", "overdue"
          - Amount due clearly stated
          - Due date or days overdue
          - Payment link/button
          - Account reference
          - Late fee warning if applicable
        counter_signals:
          - No payment amount
          - No due date
          - Already paid confirmation
        examples:
          - "Friendly reminder: Payment due tomorrow"
          - "Your bill is due in 3 days"
          - "Payment Reminder - Account Update Needed"
          - "Don't forget: Invoice #123 due Friday"
          - "Your subscription payment failed"
        typical_correlations:
          campaign_goal: drive_purchase
          tone_of_voice: direct_no_nonsense, friendly_warm
          urgency_level: moderate, high
          trigger_type: lifecycle

      # ------------------------------------------------------------------------
      # ACCOUNT EMAILS
      # ------------------------------------------------------------------------

      password_reset:
        semantics: |
          Security email with link/code to reset account password.
          Time-sensitive and security-focused.
        signals:
          - Subject contains "password", "reset", "security"
          - Reset link with expiration time
          - Security warnings about not sharing
          - "If you didn't request this disclaimer"
          - No promotional content
          - Plain design, security-focused
        counter_signals:
          - Missing reset link
          - Marketing content included
          - No expiration mentioned
        examples:
          - "Reset your password"
          - "Password Reset Request"
          - "Forgot your password? No problem"
          - "Security Alert: Password Reset"
          - "Your password reset link (expires in 1 hour)"
        typical_correlations:
          campaign_goal: nurture_relationships
          tone_of_voice: serious_informative, direct_no_nonsense
          trigger_type: transactional
          design_aesthetic: minimalist
          copy_length: ultra_short

      account_verification:
        semantics: |
          Email to verify account ownership or email address validity.
          Often part of signup flow or security check.
        signals:
          - Subject contains "verify", "confirm your email", "activate"
          - Verification link or code
          - Time limit for verification
          - Security context
          - Minimal design, focused call-to-action
        counter_signals:
          - No verification mechanism
          - Marketing content
          - Already verified context
        examples:
          - "Verify your email address"
          - "Please confirm your account"
          - "Activate your account"
          - "One more step: Verify your email"
          - "Confirm your email to get started"
        typical_correlations:
          campaign_goal: drive_signups
          tone_of_voice: direct_no_nonsense, friendly_warm
          trigger_type: transactional
          copy_length: ultra_short

      account_update:
        semantics: |
          Notification of changes to account settings, profile, or status.
          Informational and may require action confirmation.
        signals:
          - Subject mentions account, settings, profile changes
          - Description of what changed
          - Confirmation this was expected
          - Security check ("Was this you?")
          - Link to review account
        counter_signals:
          - No mention of specific change
          - Pure marketing intent
        examples:
          - "Your account settings were updated"
          - "Profile changes saved"
          - "Your payment method was updated"
          - "Account security update"
          - "Your preferences have been changed"
        typical_correlations:
          campaign_goal: nurture_relationships
          tone_of_voice: serious_informative
          trigger_type: transactional
          copy_length: brief

      # ------------------------------------------------------------------------
      # WELCOME & ONBOARDING
      # ------------------------------------------------------------------------

      welcome:
        semantics: |
          First email after signup/purchase, establishing the brand relationship.
          Sets expectations and may include first-time offers.
        signals:
          - Subject contains "welcome", "thanks for joining", "you're in"
          - Brand introduction or story
          - What to expect from the relationship
          - First-time discount often included
          - Links to get started or explore
          - Warm, personal tone
        counter_signals:
          - Not first contact with subscriber
          - Heavy sales focus without welcome context
          - No brand introduction
          - "NEW: Sequential series structure with numbered steps or days (differentiates from onboarding)"
          - "NEW: Focus on how-to or educational tutorials (differentiates from onboarding)"
        examples:
          - "Welcome to [Brand]! Here's 10% off"
          - "You're in! Welcome to the family"
          - "Thanks for joining - here's what's next"
          - "Welcome aboard! Let's get started"
          - "Hi [Name], welcome to [Brand]"
        typical_correlations:
          campaign_goal: nurture_relationships, drive_purchase
          tone_of_voice: friendly_warm, excited_enthusiastic
          relationship_stage: new_subscriber, onboarding
          trigger_type: lifecycle
          personalization_level: basic, moderate

      onboarding:
        semantics: |
          Part of a series that educates new users/customers on how to
          get the most value. Often numbered or sequenced.
        signals:
          - Subject indicates sequence ("Step 2", "Day 3", "Part 1")
          - Educational content focus
          - How-to or tutorial elements
          - Progress indicators
          - Links to help/support
          - Feature highlights
        counter_signals:
          - Sales/promotional focus
          - No educational content
          - Not part of a sequence
          - "NEW: Brand introduction or welcome messaging (differentiates from welcome)"
          - "NEW: Single welcome occasion without sequential structure (differentiates from welcome)"
        examples:
          - "Getting Started: Step 1 of 5"
          - "Day 2: How to use [Feature]"
          - "Your first week with [Product]"
          - "Quick tip #1: Save time with..."
          - "Onboarding Week 1: The basics"
        typical_correlations:
          campaign_goal: educate_audience, nurture_relationships
          tone_of_voice: educational_instructive, helpful_supportive
          relationship_stage: onboarding
          trigger_type: lifecycle
          send_frequency: series_part

      activation:
        semantics: |
          Email encouraging first meaningful action or feature usage.
          Goal is moving user from signup to active engagement.
        signals:
          - Subject emphasizes action ("Try", "Start", "Explore")
          - Focus on key activation metric
          - Clear single CTA
          - Benefit-focused copy
          - May include quick-start guide
        counter_signals:
          - User already activated
          - Multiple competing CTAs
          - No clear action
        examples:
          - "Ready to get started? Here's how"
          - "Take your first step"
          - "Complete your profile to unlock..."
          - "Start your first [action] today"
          - "Your account is ready - let's begin"
        typical_correlations:
          campaign_goal: drive_signups, increase_email_engagement
          tone_of_voice: encouraging, helpful_supportive
          relationship_stage: onboarding
          trigger_type: behavioral

      # ------------------------------------------------------------------------
      # PROMOTIONAL EMAILS
      # ------------------------------------------------------------------------

      flash_sale:
        semantics: |
          Time-limited sale with significant discounts, typically 24-48 hours.
          High urgency, deep discounts, limited time messaging.
        signals:
          - Subject contains "flash", "24 hours", "today only", "ends tonight"
          - Countdown timer prominently displayed
          - Significant discount (30%+ typically)
          - Urgency language throughout
          - Limited time clearly stated
          - Bold, attention-grabbing design
        counter_signals:
          - No time limit mentioned
          - Modest discounts
          - Evergreen content
          - No countdown or deadline
          - "NEW: Moderate urgency without extreme time pressure (differentiates from discount_offer)"
          - "NEW: Long expiration window or vague deadline (differentiates from discount_offer)"
        examples:
          - "⚡ FLASH SALE: 50% off everything - 24 hours only"
          - "Ends at midnight: Our biggest sale"
          - "6-Hour Flash Sale starts NOW"
          - "Today only: Extra 40% off"
          - "Flash Sale Alert! Don't miss out"
        typical_correlations:
          campaign_goal: drive_purchase
          tone_of_voice: urgent_time_sensitive, excited_enthusiastic
          urgency_level: extreme, high
          trigger_type: promotional
          body_sections: [countdown_timer, flash_sale_banner, product_grid]

      seasonal_sale:
        semantics: |
          Sale tied to a season, holiday, or calendar event (Black Friday,
          Summer Sale, Back to School). Longer duration than flash sale.
        signals:
          - Subject references season/holiday/event
          - Thematic design (holiday colors, seasonal imagery)
          - Sale duration in days/weeks
          - Event-specific messaging
          - Often includes exclusive items
        counter_signals:
          - No seasonal/holiday connection
          - Flash sale urgency
          - Year-round pricing
        examples:
          - "Black Friday: Up to 60% off sitewide"
          - "Summer Sale is here ☀️"
          - "Holiday Gift Guide + 25% off"
          - "Back to School: Everything you need"
          - "Spring into savings - 30% off"
        typical_correlations:
          campaign_goal: drive_purchase
          tone_of_voice: celebratory, excited_enthusiastic
          urgency_level: moderate
          trigger_type: promotional
          send_frequency: seasonal

      clearance_sale:
        semantics: |
          Deep discounts on end-of-season or discontinued inventory.
          Focus on value and limited availability.
        signals:
          - Subject contains "clearance", "final sale", "last chance"
          - Deep discounts (50%+ common)
          - "While supplies last messaging"
          - End-of-season or discontinued mentions
          - No returns/final sale warnings
        counter_signals:
          - New arrivals emphasis
          - Modest discounts
          - Seasonal/holiday theme
        examples:
          - "Clearance: Up to 70% off - Final Sale"
          - "End of Season: Everything must go"
          - "Last Chance: Clearance ends Sunday"
          - "Final markdowns: Extra 40% off sale"
          - "Warehouse Clearance Event"
        typical_correlations:
          campaign_goal: drive_purchase
          tone_of_voice: urgent_time_sensitive
          urgency_level: high
          market_position: budget, value
          body_sections: [product_grid, limited_stock]

      discount_offer:
        semantics: |
          General promotional email offering a percentage or dollar discount.
          May be sitewide, category-specific, or product-specific.
        signals:
          - Subject states discount amount (% or $)
          - Promo code if required
          - Terms and conditions
          - Expiration date
          - Applicable products/categories
        counter_signals:
          - No specific discount stated
          - Full-price focus
          - Flash sale urgency
          - "NEW: Countdown timer or extreme time pressure (24-48 hours) (differentiates from flash_sale)"
          - "NEW: Open-ended expiration without specific end time (differentiates from flash_sale)"
          - "NEW: Modest discount amount under 30% (differentiates from flash_sale)"
        examples:
          - "Take 20% off your next order"
          - "Your exclusive 15% discount inside"
          - "Save $25 on orders over $100"
          - "Members get 30% off this week"
          - "Use code SAVE20 for 20% off"
        typical_correlations:
          campaign_goal: drive_purchase
          tone_of_voice: direct_no_nonsense, exclusive_vip
          urgency_level: moderate
          trigger_type: promotional
          body_sections: [coupon_box, discount_badge]

      bogo_offer:
        semantics: |
          Buy-one-get-one style promotion (BOGO, B1G1, Buy 2 Get 1).
          Focus on value and quantity incentive.
        signals:
          - Subject contains "BOGO", "buy one get one", "buy 2 get 1"
          - Clear offer terms
          - Qualifying products shown
          - Value proposition emphasized
          - May require code
        counter_signals:
          - Percentage discount
          - Single item focus
          - No quantity incentive
        examples:
          - "BOGO 50% off all shoes"
          - "Buy 2, Get 1 Free"
          - "Buy one, gift one free"
          - "B1G1 on all accessories"
          - "Mix & Match: Buy 2, Save 50%"
        typical_correlations:
          campaign_goal: drive_purchase, increase_order_value
          tone_of_voice: excited_enthusiastic
          body_sections: [product_grid, bundle_offer]

      bundle_deal:
        semantics: |
          Promotion offering multiple items together at a reduced price.
          Focuses on value of combined purchase.
        signals:
          - Subject mentions "bundle", "set", "kit", "package"
          - Multiple items shown together
          - Combined savings highlighted
          - "Complete the look or \"Everything you need\""
          - Bundle price vs individual pricing
        counter_signals:
          - Single product focus
          - No combined offering
          - Quantity discount only
        examples:
          - "The Complete Skincare Bundle - Save 40%"
          - "Starter Kit: Everything you need"
          - "Build your bundle and save"
          - "The Perfect Pair: Bundle & Save"
          - "Home Office Essentials Bundle"
        typical_correlations:
          campaign_goal: increase_order_value, drive_purchase
          body_sections: [bundle_offer, product_comparison]

      free_shipping_offer:
        semantics: |
          Promotion emphasizing free shipping as the primary incentive.
          May be threshold-based or unconditional.
        signals:
          - Subject prominently features "free shipping"
          - Threshold if applicable ("over $50")
          - Time limit if any
          - Shipping speed mentioned
          - No code needed often emphasized
        counter_signals:
          - Shipping not mentioned
          - Discount is primary offer
          - Standard shipping policy
        examples:
          - "🚚 FREE SHIPPING all weekend"
          - "Free shipping on orders $75+"
          - "Free 2-day shipping for members"
          - "No minimum: Free shipping today"
          - "Free express shipping ends tonight"
        typical_correlations:
          campaign_goal: drive_purchase
          tone_of_voice: excited_enthusiastic
          body_sections: [free_shipping_banner]

      # ------------------------------------------------------------------------
      # PRODUCT EMAILS
      # ------------------------------------------------------------------------

      product_launch:
        semantics: |
          Announcement of a new product or product line being released.
          Emphasis on newness, innovation, and availability.
        signals:
          - Subject contains "introducing", "new", "launch", "just dropped"
          - Product hero imagery
          - Feature highlights
          - Launch date or "available now"
          - Early access or pre-order option
        counter_signals:
          - Existing product promotion
          - Price/discount focus
          - Restocking context
          - "NEW: Multiple products shown together (differentiates from new_arrival)"
          - "NEW: Focus on catalog expansion or selection breadth (differentiates from new_arrival)"
          - "NEW: Product grid showcasing variety rather than single hero product (differentiates from new_arrival)"
        examples:
          - "Introducing: The All-New [Product]"
          - "Just Dropped: [Product Name]"
          - "It's here: [Product] Launch Day"
          - "Be the first to try [New Product]"
          - "Launching today: Meet [Product]"
        typical_correlations:
          campaign_goal: build_brand_awareness, drive_purchase
          tone_of_voice: excited_enthusiastic
          trigger_type: promotional
          body_sections: [single_product, feature_cards]

      new_arrival:
        semantics: |
          Showcase of recently added products to the catalog.
          Focus on freshness and selection expansion.
        signals:
          - Subject contains "new arrivals", "just in", "fresh drops"
          - Multiple new products featured
          - Recent addition emphasis
          - "Shop new or \"See what's new\" CTA"
        counter_signals:
          - Single product launch
          - Back in stock context
          - Sale/discount focus
          - "NEW: Single hero product with feature highlights (differentiates from product_launch)"
          - "NEW: Emphasis on innovation or new product features (differentiates from product_launch)"
          - "NEW: Pre-order or exclusive early access messaging (differentiates from product_launch)"
        examples:
          - "New arrivals just hit the shop"
          - "Fresh drops: This week's new additions"
          - "Just in: Spring Collection"
          - "See what's new this week"
          - "New arrivals you'll love"
        typical_correlations:
          campaign_goal: drive_website_traffic, drive_purchase
          body_sections: [product_grid, new_arrival_badge]

      back_in_stock:
        semantics: |
          Notification that a previously sold-out item is available again.
          Often personalized based on wishlist or browse history.
        signals:
          - Subject contains "back in stock", "available again", "restocked"
          - Specific product mentioned
          - Urgency around limited quantity
          - "You wanted this personalization"
        counter_signals:
          - New product context
          - General inventory
          - Never sold out
        examples:
          - "It's back! [Product] is in stock"
          - "Back in stock: The item you wanted"
          - "Restocked and ready to ship"
          - "Finally back: Limited quantities"
          - "Your waitlist item is available"
        typical_correlations:
          campaign_goal: drive_purchase
          tone_of_voice: excited_enthusiastic, urgent_time_sensitive
          trigger_type: behavioral
          personalization_level: advanced
          body_sections: [single_product, limited_stock]

      price_drop_alert:
        semantics: |
          Notification that an item has been reduced in price.
          Often personalized based on browse/wishlist activity.
        signals:
          - Subject contains "price drop", "reduced", "on sale now"
          - Before/after pricing shown
          - Specific product featured
          - Savings amount highlighted
          - "Item you viewed personalization"
        counter_signals:
          - New product
          - General sale
          - No price comparison
        examples:
          - "Price Drop: [Product] is now $X"
          - "Good news! Something in your wishlist is on sale"
          - "The item you viewed just dropped in price"
          - "Price Alert: Save 30% on [Product]"
          - "We noticed you looking - it's now on sale"
        typical_correlations:
          campaign_goal: drive_purchase
          trigger_type: behavioral
          personalization_level: advanced
          body_sections: [single_product, discount_badge]

      product_update:
        semantics: |
          Announcement of improvements or changes to an existing product.
          For software/SaaS or physical product enhancements.
        signals:
          - Subject contains "update", "improved", "new features"
          - Existing product context
          - What's changed/improved
          - Version number for software
          - "Now even better messaging"
        counter_signals:
          - New product launch
          - No change mentioned
          - Price focus
        examples:
          - "[Product] just got better - see what's new"
          - "Version 2.0 is here"
          - "Product Update: New features inside"
          - "We improved [Product] based on your feedback"
          - "What's new in [Product] this month"
        typical_correlations:
          campaign_goal: announce_news, nurture_relationships
          business_model: saas
          trigger_type: promotional

      feature_announcement:
        semantics: |
          Highlight of a specific new feature or capability.
          Often for SaaS/software products.
        signals:
          - Subject names specific feature
          - Feature demo or screenshots
          - How-to or tutorial content
          - "Now you can... messaging"
          - Beta/early access for complex features
        counter_signals:
          - Full product launch
          - Multiple features without focus
          - Non-product news
        examples:
          - "New: [Feature Name] is here"
          - "Introducing [Feature] - here's how it works"
          - "You asked, we built: [Feature]"
          - "Big update: [Feature] is now live"
          - "Try our newest feature"
        typical_correlations:
          campaign_goal: announce_news, educate_audience
          business_model: saas
          body_sections: [feature_cards, feature_icons]

      waitlist_notification:
        semantics: |
          Notification to waitlist members about product availability
          or their position in queue.
        signals:
          - Subject references waitlist, queue, or exclusive access
          - "You're in or \"Your turn\" messaging"
          - Time-limited access window
          - Exclusive/early access framing
        counter_signals:
          - General availability
          - No waitlist context
          - Back in stock (different trigger)
        examples:
          - "You're off the waitlist - shop now"
          - "Your exclusive access starts now"
          - "The wait is over: [Product] is yours"
          - "Waitlist update: You're next"
          - "VIP access: Available for you now"
        typical_correlations:
          campaign_goal: drive_purchase
          tone_of_voice: exclusive_vip, excited_enthusiastic
          trigger_type: behavioral
          personalization_level: advanced

      allocation_notice:
        semantics: |
          Notification to preferred customers about limited quantity product allocations.
          Common in luxury goods, fine wines, limited editions. Exclusive access to
          purchase scarce products before general availability.
        signals:
          - Subject contains allocation, reserved for you, your allocation keywords
          - Limited quantity emphasized
          - Exclusive customer language like valued customer or preferred member
          - Time-limited purchase window
          - Product scarcity messaging
          - Premium/luxury product focus
        counter_signals:
          - General availability mentioned
          - Discount or sale language
          - Mass-market products
          - No quantity limits
          - Back in stock messaging (that's back_in_stock type)
        examples:
          - "Your Wine Allocation: 2024 Vintage Reserve"
          - "Exclusive Allocation: Limited Edition Watch"
          - "Member Allocation Notice: Rare Bourbon Release"
          - "Your Reserved Allocation Expires Friday"
          - "Priority Access: Allocated Units Available"
        typical_correlations:
          campaign_goal: drive_purchase
          tone_of_voice: exclusive_vip, sophisticated_refined
          market_position: luxury, premium
          relationship_stage: vip_customer, loyal_customer
          urgency_level: moderate
          personalization_level: advanced
          trigger_type: promotional
          body_sections: [product_showcase, allocation_details, purchase_window]

      exclusive_access:
        semantics: |
          Early or VIP-only access to sales, products, or content before general release.
          Focuses on privileged timing rather than quantity limits. Rewards loyalty with
          first access to new items or sales events.
        signals:
          - Subject contains early access, VIP access, exclusive preview keywords
          - Before everyone else or first look language
          - Member/VIP tier referenced
          - Countdown to general release
          - Pre-sale or preview access
        counter_signals:
          - Limited quantity focus (that's allocation_notice)
          - Already publicly available
          - No membership/tier reference
          - Waitlist context (that's waitlist_notification)
        examples:
          - "VIP Early Access: Summer Sale Starts Now"
          - "Exclusive Preview: New Collection"
          - "Members-Only: Shop 24 Hours Early"
          - "Your Early Access Pass to Black Friday"
          - "First Look: New Arrivals for VIPs"
        typical_correlations:
          campaign_goal: drive_purchase, build_brand_awareness
          tone_of_voice: exclusive_vip, excited_enthusiastic
          relationship_stage: vip_customer, loyal_customer, engaged_subscriber
          urgency_level: moderate, high
          personalization_level: moderate, advanced
          trigger_type: promotional, lifecycle
          body_sections: [exclusive_badge, product_grid, countdown_timer]

      # ------------------------------------------------------------------------
      # CART RECOVERY EMAILS
      # ------------------------------------------------------------------------

      abandoned_cart:
        semantics: |
          Reminder about items left in shopping cart without checkout.
          Primary goal is cart recovery/purchase completion.
        signals:
          - Subject references cart, left behind, forgot
          - Shows actual cart items
          - Direct link to resume checkout
          - May include incentive (discount, free shipping)
          - Urgency messaging (items may sell out)
        counter_signals:
          - No cart items shown
          - Browse history focus
          - Wishlist context
          - "NEW: Softer CTA language like 'take another look' (differentiates from browse_abandonment)"
          - "NEW: Similar product recommendations instead of exact cart items (differentiates from browse_abandonment)"
          - "NEW: No urgency around checkout or order completion (differentiates from browse_abandonment)"
        examples:
          - "Did you forget something?"
          - "Your cart is waiting"
          - "Complete your purchase - items are selling fast"
          - "Still thinking it over? Here's 10% off"
          - "You left this behind 👀"
        typical_correlations:
          campaign_goal: drive_purchase
          tone_of_voice: friendly_warm, urgent_time_sensitive
          trigger_type: behavioral
          personalization_level: advanced
          body_sections: [product_grid, coupon_box, limited_stock]

      browse_abandonment:
        semantics: |
          Follow-up for items viewed but not added to cart.
          Softer than cart abandonment, more suggestive.
        signals:
          - Subject references "looked at", "caught your eye", "checking out"
          - Shows browsed products
          - Softer CTA than cart abandonment
          - May include similar recommendations
        counter_signals:
          - Cart items specifically
          - Checkout language
          - Order context
          - "NEW: Direct 'resume checkout' link to cart (differentiates from abandoned_cart)"
          - "NEW: High urgency around item depletion or limited stock (differentiates from abandoned_cart)"
          - "NEW: Specific items in active cart ready for purchase (differentiates from abandoned_cart)"
        examples:
          - "Still thinking about this?"
          - "Take another look"
          - "Something catch your eye?"
          - "You viewed these items recently"
          - "Based on your browsing..."
        typical_correlations:
          campaign_goal: drive_purchase
          tone_of_voice: casual_conversational
          trigger_type: behavioral
          personalization_level: advanced

      wishlist_reminder:
        semantics: |
          Reminder about items saved to wishlist or favorites.
          May be triggered by time, sale, or low stock.
        signals:
          - Subject references wishlist, saved, favorites
          - Shows saved items
          - May include price drop or low stock alert
          - "Treat yourself messaging"
        counter_signals:
          - Cart context
          - Browse history only
          - No saved items reference
        examples:
          - "Your wishlist is waiting"
          - "Items in your favorites are going fast"
          - "Treat yourself: Your saved items"
          - "Your wishlist item is almost gone"
          - "Time to check off your wishlist?"
        typical_correlations:
          campaign_goal: drive_purchase
          trigger_type: behavioral
          personalization_level: highly_personalized

      saved_items_reminder:
        semantics: |
          General reminder about saved-for-later items.
          Broader than wishlist, may include multiple save contexts.
        signals:
          - Subject mentions "saved", "for later", "your items"
          - Shows saved products
          - Encouragement to purchase
          - May combine multiple save sources
        counter_signals:
          - Cart specific
          - Wishlist specific branding
          - No saved context
        examples:
          - "Your saved items miss you"
          - "Ready to revisit your saves?"
          - "Items you saved are still available"
          - "Your saved items: Limited time"
          - "Don't forget what you saved"
        typical_correlations:
          campaign_goal: drive_purchase
          trigger_type: behavioral

      # ------------------------------------------------------------------------
      # RECOMMENDATION EMAILS
      # ------------------------------------------------------------------------

      product_recommendation:
        semantics: |
          Personalized product suggestions based on purchase history,
          browse behavior, or preferences. AI/algorithm-driven.
        signals:
          - Subject contains "picked for you", "you might like", "recommended"
          - Personalized product grid
          - "Based on your... framing"
          - Multiple product options
          - Algorithm/AI personalization evident
        counter_signals:
          - Generic bestseller list
          - New arrivals focus
          - Single product
          - "NEW: Multiple content topics mixed with product promotions (differentiates from newsletter)"
          - "NEW: Editorial voice and magazine-style layout (differentiates from newsletter)"
          - "NEW: Regular send schedule on fixed calendar (differentiates from newsletter)"
        examples:
          - "Picked just for you"
          - "Based on your recent purchase..."
          - "You might love these"
          - "Personalized recommendations"
          - "Because you bought [X], try [Y]"
        typical_correlations:
          campaign_goal: drive_purchase
          trigger_type: behavioral
          personalization_level: highly_personalized, real_time
          body_sections: [product_grid, product_categories]

      cross_sell_upsell:
        semantics: |
          Post-purchase recommendations for complementary (cross-sell)
          or upgraded (upsell) products.
        signals:
          - Sent after purchase
          - References recent purchase
          - "Complete the look, Goes great with"
          - Complementary products shown
          - Upgrade options for upsell
        counter_signals:
          - No purchase context
          - General recommendations
          - Unrelated products
        examples:
          - "Complete your [Purchase] with these"
          - "Pairs perfectly with your new [Product]"
          - "Upgrade your experience"
          - "Customers who bought X also bought Y"
          - "Add these to your collection"
        typical_correlations:
          campaign_goal: increase_order_value, drive_purchase
          trigger_type: behavioral
          relationship_stage: active_engaged, loyal_customer

      # ------------------------------------------------------------------------
      # CONTENT EMAILS
      # ------------------------------------------------------------------------

      newsletter:
        semantics: |
          Regular content digest sent on a schedule (weekly, monthly).
          Mix of content types, company updates, and curated information.
        signals:
          - Regular send schedule referenced
          - Date or issue number
          - Multiple content sections
          - Mix of topics/stories
          - Editorial voice
        counter_signals:
          - Single topic focus
          - Sales-only content
          - Transactional trigger
          - "NEW: AI-driven personalization based on individual behavior (differentiates from product_recommendation)"
          - "NEW: Behavioral trigger sent on-demand (differentiates from product_recommendation)"
          - "NEW: Algorithmic grouping of products by similarity (differentiates from product_recommendation)"
          - "NEW: Product-only grid layout without editorial content (differentiates from product_recommendation)"
        examples:
          - "The Weekly Digest - Issue #42"
          - "This week at [Brand]"
          - "Your monthly roundup"
          - "[Brand] Newsletter - January Edition"
          - "What's new this week"
        typical_correlations:
          campaign_goal: nurture_relationships, educate_audience
          tone_of_voice: friendly_warm, educational_instructive
          send_frequency: weekly, monthly
          layout_structure: newsletter_digest, magazine_editorial
          body_sections: [blog_preview, table_of_contents]

      content_digest:
        semantics: |
          Curated collection of content pieces (articles, videos, resources).
          More content-focused than general newsletter.
        signals:
          - Multiple content pieces
          - Article/resource previews
          - "Top stories, Best of framing"
          - Read time estimates
          - Content categories
        counter_signals:
          - Company news focus
          - Single article
          - Product focus
        examples:
          - "This week's top reads"
          - "5 articles you might have missed"
          - "Content roundup: Marketing edition"
          - "Your weekly content digest"
          - "Best of the blog this month"
        typical_correlations:
          campaign_goal: educate_audience, drive_website_traffic
          body_sections: [blog_preview, table_of_contents]

      educational_content:
        semantics: |
          Teaching-focused email with how-to, tutorial, or informational content.
          Primary goal is education, not direct sales.
        signals:
          - How-to or tutorial focus
          - Step-by-step instructions
          - Tips and best practices
          - Expert positioning
          - Learning-focused CTA
        counter_signals:
          - Product sales focus
          - News/update focus
          - Entertainment content
        examples:
          - "How to [achieve goal] in 5 steps"
          - "The complete guide to [topic]"
          - "Master [skill] with these tips"
          - "Learn [topic]: Free tutorial"
          - "Expert tips for [challenge]"
        typical_correlations:
          campaign_goal: educate_audience
          tone_of_voice: educational_instructive, helpful_supportive
          copy_length: detailed, long_form
          body_sections: [numbered_steps, infographic]

      case_study:
        semantics: |
          Detailed customer success story showing results and process.
          Social proof through narrative.
        signals:
          - Customer name/company featured
          - Before/after or results metrics
          - Problem/solution narrative
          - Testimonial quotes
          - Industry/use case specific
        counter_signals:
          - No specific customer
          - General testimonials only
          - No results/metrics
        examples:
          - "How [Company] achieved 50% growth"
          - "Case Study: [Customer] Success Story"
          - "[Customer]: From challenge to solution"
          - "See how [Customer] did it"
          - "Real results: [Customer]'s story"
        typical_correlations:
          campaign_goal: build_brand_awareness, generate_leads
          tone_of_voice: educational_instructive
          business_model: b2b, saas
          body_sections: [case_study, testimonial_section, statistics_metrics]

      press_release:
        semantics: |
          Formal company announcement in press release format.
          Official tone, newsworthy content.
        signals:
          - Press release format
          - "FOR IMMEDIATE RELEASE or similar"
          - Formal/journalistic tone
          - Quote from executive
          - Media contact information
          - Boilerplate company description
        counter_signals:
          - Casual tone
          - Sales messaging
          - No news angle
        examples:
          - "[Company] Announces [Major News]"
          - "Press Release: [Announcement]"
          - "[Company] Partners with [Partner]"
          - "Announcing: [Milestone/Achievement]"
          - "[Company] Expands to [Market]"
        typical_correlations:
          campaign_goal: build_brand_awareness, announce_news
          tone_of_voice: formal_professional
          business_model: b2b, enterprise

      # ------------------------------------------------------------------------
      # ENGAGEMENT EMAILS
      # ------------------------------------------------------------------------

      survey_feedback:
        semantics: |
          Request for customer feedback through survey or questionnaire.
          Focus on gathering opinions and data.
        signals:
          - Subject mentions survey, feedback, opinion
          - Survey link or embedded questions
          - Time estimate to complete
          - Incentive for completion often included
          - "Your opinion matters messaging"
        counter_signals:
          - Review request (product-specific)
          - NPS only (single question)
          - No survey mechanism
        examples:
          - "We'd love your feedback (2-min survey)"
          - "Share your thoughts - take our survey"
          - "Quick survey: Help us improve"
          - "Your opinion matters to us"
          - "Tell us what you think + win [prize]"
        typical_correlations:
          campaign_goal: collect_feedback
          tone_of_voice: friendly_warm
          body_sections: [survey_preview]

      review_request:
        semantics: |
          Request for product or service review, typically post-purchase.
          Focus on public review generation.
        signals:
          - Subject mentions review, rating, stars
          - Recently purchased product shown
          - Review platform links
          - Star rating visualization
          - "How was [product]? framing"
        counter_signals:
          - General survey
          - No recent purchase context
          - Private feedback only
        examples:
          - "How's your new [Product]? Leave a review"
          - "Review your purchase"
          - "⭐ Rate your recent order"
          - "Share your experience with [Product]"
          - "Your review helps others"
        typical_correlations:
          campaign_goal: request_reviews
          trigger_type: behavioral
          relationship_stage: active_engaged
          body_sections: [star_ratings, single_product]

      poll:
        semantics: |
          Single or few-question engagement to gather quick opinions.
          Lighter than survey, often visual/interactive.
        signals:
          - Single question focus
          - Visual voting options
          - Quick/easy participation
          - Results may be shared
          - Playful/engaging tone
        counter_signals:
          - Full survey
          - No voting mechanism
          - Text-heavy
        examples:
          - "Quick poll: Which do you prefer?"
          - "Vote: A or B?"
          - "Help us decide: Take our poll"
          - "Your vote: [Option A] vs [Option B]"
          - "Poll: What should we make next?"
        typical_correlations:
          campaign_goal: increase_email_engagement
          tone_of_voice: playful_fun
          body_sections: [poll_preview]

      quiz:
        semantics: |
          Interactive quiz for engagement, personalization, or fun.
          Often leads to personalized recommendations.
        signals:
          - Subject mentions quiz, test, find out
          - Interactive/gamified element
          - Personality or preference focus
          - Results promised
          - Fun/engaging tone
        counter_signals:
          - Survey/feedback context
          - No interactive element
          - Serious/formal tone
        examples:
          - "Take the quiz: Find your perfect [product]"
          - "What's your [type]? Take our quiz"
          - "Quiz: Which [product] is right for you?"
          - "Find out in 2 minutes: Take the quiz"
          - "Quiz time! Discover your [result]"
        typical_correlations:
          campaign_goal: increase_email_engagement, generate_leads
          tone_of_voice: playful_fun
          body_sections: [quiz_teaser]

      ugc_request:
        semantics: |
          Request for user-generated content (photos, videos, stories).
          Goal is gathering authentic customer content.
        signals:
          - Request for photos/videos/stories
          - Hashtag or submission instructions
          - Incentive or feature opportunity
          - Contest context often
          - "Show us or \"Share your\" messaging"
        counter_signals:
          - Review request only
          - No content submission mechanism
          - General engagement
        examples:
          - "Share your [product] photos"
          - "Show us how you style [product]"
          - "Submit your story for a chance to be featured"
          - "Tag us #[hashtag] to win"
          - "We want to see your [product] in action"
        typical_correlations:
          campaign_goal: drive_social_engagement
          body_sections: [ugc_gallery, customer_photos]

      year_in_review:
        semantics: |
          Annual retrospective of customer activity or company highlights.
          Personalized stats and milestone celebration.
        signals:
          - Year reference (2024, etc.)
          - Personal statistics and data
          - Milestone/achievement highlights
          - Nostalgic/celebratory tone
          - "Your year or \"Year in review\" framing"
        counter_signals:
          - Monthly update
          - No retrospective content
          - Forward-looking focus
        examples:
          - "Your 2024 in review"
          - "Wrapped: Your year with [Brand]"
          - "2024 Highlights: Your journey with us"
          - "Look back at your year"
          - "Your [Brand] Year in Review"
        typical_correlations:
          campaign_goal: nurture_relationships
          tone_of_voice: celebratory, nostalgic_sentimental
          trigger_type: lifecycle
          body_sections: [statistics_metrics, timeline]

      # ------------------------------------------------------------------------
      # EVENT EMAILS
      # ------------------------------------------------------------------------

      save_the_date:
        semantics: |
          Early announcement of upcoming event asking recipients to
          mark calendars. Registration typically comes later.
        signals:
          - Subject contains "save the date", "mark your calendar"
          - Event date prominently displayed
          - No registration yet (coming soon)
          - Teaser content about event
          - Calendar add option
        counter_signals:
          - Registration open
          - Full event details
          - Past event
        examples:
          - "Save the Date: [Event] on [Date]"
          - "Mark your calendar 📅"
          - "Coming [Date]: [Event Name]"
          - "Save the date for something special"
          - "Don't miss it: [Event] - Save the date"
        typical_correlations:
          campaign_goal: drive_event_attendance
          body_sections: [event_details, calendar_widget]

      event_invitation:
        semantics: |
          Invitation to event with registration/RSVP option.
          Full event details and sign-up mechanism.
        signals:
          - Subject contains "you're invited", "join us"
          - Complete event details
          - Registration/RSVP link
          - Speakers/agenda if applicable
          - Location or virtual platform info
        counter_signals:
          - Save the date (no registration)
          - Reminder (already registered)
          - Post-event
        examples:
          - "You're invited: [Event Name]"
          - "Join us for [Event] - RSVP now"
          - "Invitation: [Event] on [Date]"
          - "Register now: [Event]"
          - "You're on the list: [Event] invitation"
        typical_correlations:
          campaign_goal: drive_event_attendance
          body_sections: [event_details, rsvp_button]

      webinar_invitation:
        semantics: |
          Invitation specifically for online webinar or virtual event.
          Focus on topic, speakers, and registration.
        signals:
          - Subject mentions webinar, online event, live
          - Topic/title prominently displayed
          - Speaker information
          - Date/time with timezone
          - Registration link
          - "Live or \"virtual\" indication"
        counter_signals:
          - In-person event
          - Pre-recorded content
          - No registration
        examples:
          - "Join our webinar: [Topic]"
          - "Live webinar: [Title] with [Speaker]"
          - "Register: Free webinar on [Topic]"
          - "You're invited to our virtual event"
          - "Webinar alert: [Topic] - Register now"
        typical_correlations:
          campaign_goal: drive_event_attendance, generate_leads
          business_model: b2b, saas
          body_sections: [webinar_card, team_spotlight]

      event_reminder:
        semantics: |
          Reminder about upcoming event for registered attendees.
          Includes logistics and preparation info.
        signals:
          - Subject contains "reminder", "tomorrow", "starting soon"
          - Event already registered for
          - Time/date reinforced
          - Access links or logistics
          - "Add to calendar if not added"
        counter_signals:
          - Initial invitation
          - No prior registration
          - Post-event
        examples:
          - "Reminder: [Event] is tomorrow"
          - "[Event] starts in 1 hour"
          - "Don't forget: [Event] details inside"
          - "Your event reminder for [Event]"
          - "See you tomorrow at [Event]!"
        typical_correlations:
          campaign_goal: drive_event_attendance
          trigger_type: lifecycle
          tone_of_voice: friendly_warm

      event_followup:
        semantics: |
          Post-event email with resources, recordings, or next steps.
          Thank you and continued engagement.
        signals:
          - Subject references event that happened
          - "Thank you for attending"
          - Recording or replay link
          - Resources/slides shared
          - Survey or feedback request
          - Next event teaser
        counter_signals:
          - Pre-event
          - No event context
          - Live event happening
        examples:
          - "Thanks for joining [Event]"
          - "[Event] Recap + Recording"
          - "Post-[Event] resources"
          - "What you missed at [Event]"
          - "Thank you! Here's your recording"
        typical_correlations:
          campaign_goal: nurture_relationships, collect_feedback
          trigger_type: lifecycle
          body_sections: [video_thumbnail]

      conference:
        semantics: |
          Multi-day or large-scale conference promotion.
          Multiple sessions, speakers, and comprehensive agenda.
        signals:
          - Large-scale event indication
          - Multiple days or tracks
          - Speaker lineup
          - Full agenda
          - Early bird or tiered pricing
          - Venue information
        counter_signals:
          - Single session
          - Webinar scale
          - Internal event
        examples:
          - "[Conference Name] 2024 - Register Now"
          - "The biggest [Industry] event of the year"
          - "Join 5,000+ attendees at [Conference]"
          - "[Conference]: Full speaker lineup revealed"
          - "Early bird ends soon: [Conference]"
        typical_correlations:
          campaign_goal: drive_event_attendance
          body_sections: [event_agenda, team_grid]

      workshop:
        semantics: |
          Hands-on, educational session promotion.
          Focus on learning and skill-building.
        signals:
          - Subject mentions workshop, hands-on, training
          - Skill/learning outcome focus
          - Limited spots often
          - Interactive format emphasized
          - Prerequisites if any
        counter_signals:
          - Presentation only
          - Large conference
          - No hands-on element
        examples:
          - "Workshop: [Skill] Masterclass"
          - "Hands-on: Learn [Topic]"
          - "Limited spots: [Topic] Workshop"
          - "Build [Skill] in this 2-hour workshop"
          - "Workshop invitation: [Topic]"
        typical_correlations:
          campaign_goal: educate_audience, drive_event_attendance
          tone_of_voice: educational_instructive

      # ------------------------------------------------------------------------
      # RELATIONSHIP EMAILS
      # ------------------------------------------------------------------------

      thank_you:
        semantics: |
          Expression of gratitude to customer, standalone (not order confirmation).
          Relationship-building focus.
        signals:
          - Subject contains "thank you", "thanks"
          - Genuine appreciation expressed
          - No transaction confirmation
          - May include surprise gift or offer
          - Personal/warm tone
        counter_signals:
          - Order confirmation thank you
          - Transactional context
          - Sales-focused
        examples:
          - "Thank you for being a customer"
          - "A sincere thank you"
          - "Thanks for your support"
          - "We appreciate you"
          - "Thank you for [specific action]"
        typical_correlations:
          campaign_goal: nurture_relationships
          tone_of_voice: grateful_appreciative
          trigger_type: lifecycle

      birthday:
        semantics: |
          Customer birthday acknowledgment, often with special offer.
          Personalized celebration moment.
        signals:
          - Subject mentions birthday, celebrate
          - Birthday imagery (cake, candles, etc.)
          - Personal greeting
          - Birthday-specific offer
          - "Your special day messaging"
        counter_signals:
          - Anniversary (brand relationship)
          - Other milestone
          - No birthday reference
        examples:
          - "Happy Birthday, [Name]! 🎂"
          - "It's your day! Birthday gift inside"
          - "Birthday treat: [Offer] just for you"
          - "Wishing you a wonderful birthday"
          - "Your birthday reward is here"
        typical_correlations:
          campaign_goal: nurture_relationships, drive_purchase
          tone_of_voice: celebratory
          trigger_type: lifecycle
          personalization_level: moderate

      anniversary:
        semantics: |
          Celebration of customer relationship milestone (1 year, etc.).
          Brand loyalty acknowledgment.
        signals:
          - Subject mentions anniversary, years with us
          - Time-based milestone
          - Customer journey reflection
          - Loyalty acknowledgment
          - Special anniversary offer
        counter_signals:
          - Birthday
          - Purchase anniversary
          - Company anniversary only
        examples:
          - "Happy 1-year anniversary with us!"
          - "Celebrating 2 years together"
          - "It's been 1 year since you joined"
          - "Anniversary gift: Thanks for being with us"
          - "Your [Brand] anniversary"
        typical_correlations:
          campaign_goal: nurture_relationships
          tone_of_voice: grateful_appreciative
          trigger_type: lifecycle
          relationship_stage: loyal_customer

      milestone_celebration:
        semantics: |
          Celebration of customer achievement or milestone.
          Gamification or progress recognition.
        signals:
          - Achievement or milestone referenced
          - Congratulatory messaging
          - Progress visualization
          - Badge or status achievement
          - Reward for milestone
        counter_signals:
          - Time-based only (anniversary)
          - No achievement context
          - General thank you
        examples:
          - "Congratulations! You reached [Milestone]"
          - "You did it! 100 orders milestone"
          - "Badge unlocked: [Achievement]"
          - "Milestone reached: [Achievement]"
          - "Celebrating your [X] purchase"
        typical_correlations:
          campaign_goal: nurture_relationships
          tone_of_voice: celebratory
          body_sections: [statistics_metrics]

      loyalty_program:
        semantics: |
          Communication about loyalty program status, points, or benefits.
          Rewards and tier-related messaging.
        signals:
          - Loyalty/rewards program referenced
          - Points balance shown
          - Tier status
          - Redemption options
          - Benefits summary
        counter_signals:
          - No loyalty program context
          - Referral only
          - General discount
        examples:
          - "Your points balance: [X]"
          - "You're [X] points from your next reward"
          - "Loyalty update: Your tier status"
          - "Redeem your points now"
          - "New rewards available for members"
        typical_correlations:
          campaign_goal: increase_loyalty_enrollment, nurture_relationships
          relationship_stage: loyalty_member
          body_sections: [loyalty_points]

      vip_exclusive:
        semantics: |
          Exclusive content, access, or offers for VIP/top customers.
          Emphasizes special status and exclusivity.
        signals:
          - Subject contains "VIP", "exclusive", "members only"
          - Exclusivity emphasized
          - Early access or special pricing
          - Status acknowledgment
          - Not available to general audience
        counter_signals:
          - General promotion
          - New customer offer
          - Widely available
        examples:
          - "VIP Exclusive: Early access inside"
          - "For our best customers only"
          - "Members-only preview"
          - "VIP: You're first in line"
          - "Exclusive offer for top customers"
        typical_correlations:
          campaign_goal: nurture_relationships, drive_purchase
          tone_of_voice: exclusive_vip
          relationship_stage: vip, loyal_customer

      # ------------------------------------------------------------------------
      # REFERRAL EMAILS
      # ------------------------------------------------------------------------

      referral_program:
        semantics: |
          Promotion of referral program with incentive structure.
          Encouraging customers to refer friends.
        signals:
          - Subject mentions referral, "give X get X", share
          - Incentive structure explained (both parties)
          - Shareable link or code
          - Easy sharing mechanism
          - "Invite friends messaging"
        counter_signals:
          - Thank you for referral
          - No sharing mechanism
          - One-sided reward
        examples:
          - "Give $20, Get $20: Refer a friend"
          - "Share the love: Invite friends"
          - "Your referral link is ready"
          - "Earn rewards: Refer friends"
          - "Know someone who'd love us?"
        typical_correlations:
          campaign_goal: encourage_referrals
          body_sections: [referral_reward]
          relationship_stage: active_engaged, loyal_customer

      referral_thank_you:
        semantics: |
          Thank you for successful referral, reward delivery.
          Acknowledges referral completion.
        signals:
          - Subject thanks for referring
          - Referral completed confirmation
          - Reward delivery details
          - Who was referred (may be named)
          - Encouragement to refer more
        counter_signals:
          - Referral program promotion
          - No completed referral
          - Pending referral
        examples:
          - "Thanks for referring [Friend]!"
          - "Your referral reward is here"
          - "You earned $20 from your referral"
          - "Success! Your friend signed up"
          - "Referral bonus credited to your account"
        typical_correlations:
          campaign_goal: encourage_referrals, nurture_relationships
          tone_of_voice: grateful_appreciative
          trigger_type: behavioral

      # ------------------------------------------------------------------------
      # RETENTION EMAILS
      # ------------------------------------------------------------------------

      re_engagement:
        semantics: |
          Attempt to re-engage inactive or lapsing customers.
          "We miss you" messaging with incentive.
        signals:
          - Subject contains "miss you", "come back", "been a while"
          - Acknowledges time since last interaction
          - Win-back incentive often included
          - "What's new or updates since absence"
          - Warm, welcoming tone
        counter_signals:
          - Recently active customer
          - No absence acknowledgment
          - Churned/sunset context
        examples:
          - "We miss you! Here's 20% off"
          - "It's been a while - come back"
          - "Long time no see, [Name]"
          - "We noticed you've been away"
          - "Come back! Here's what you missed"
        typical_correlations:
          campaign_goal: reactivate_users
          tone_of_voice: friendly_warm
          trigger_type: behavioral
          relationship_stage: at_risk, lapsed
          body_sections: [coupon_box]

      win_back:
        semantics: |
          Aggressive attempt to recover churned or long-lapsed customers.
          Stronger incentives and urgency than re-engagement.
        signals:
          - Strong win-back offer (significant discount)
          - "Last chance or final attempt tone"
          - Long absence acknowledged
          - Significant incentive
          - May mention subscription cancellation
        counter_signals:
          - Light re-engagement
          - Active customer
          - Sunset/goodbye context
        examples:
          - "We want you back: 40% off"
          - "Final offer: Come back to [Brand]"
          - "Last chance: Don't miss your offer"
          - "We're not giving up on you"
          - "One more try: Here's our best offer"
        typical_correlations:
          campaign_goal: reactivate_users, reduce_churn
          tone_of_voice: persuasive_compelling
          urgency_level: high
          relationship_stage: churned, dormant

      sunset:
        semantics: |
          Final email before removing subscriber from list.
          Last chance to stay subscribed or confirm interest.
        signals:
          - Subject indicates final communication
          - "Stay or go choice presented"
          - Will be removed if no action
          - Last email warning
          - Preference update option
        counter_signals:
          - Win-back with strong incentive
          - General re-engagement
          - Active subscriber
        examples:
          - "Should we part ways?"
          - "Last email unless you want to stay"
          - "Are you still interested?"
          - "Confirm you want to hear from us"
          - "We're about to remove you"
        typical_correlations:
          campaign_goal: reduce_churn
          tone_of_voice: direct_no_nonsense
          relationship_stage: dormant, churned
          trigger_type: lifecycle

      # ------------------------------------------------------------------------
      # RENEWAL EMAILS
      # ------------------------------------------------------------------------

      renewal_reminder:
        semantics: |
          Notification that subscription is expiring and needs renewal.
          Focus on continuity and preventing lapse.
        signals:
          - Subject mentions renewal, expiring, expiration
          - Renewal date clearly stated
          - Easy renewal action
          - Benefits reminder
          - What happens if not renewed
        counter_signals:
          - New subscription offer
          - Trial context
          - Already renewed
        examples:
          - "Your subscription expires in 7 days"
          - "Time to renew your membership"
          - "Renewal reminder: Don't lose access"
          - "Your [Product] renewal is coming up"
          - "Renew now to keep your benefits"
        typical_correlations:
          campaign_goal: reduce_churn
          urgency_level: moderate, high
          trigger_type: lifecycle
          business_model: subscription, saas

      trial_expiring:
        semantics: |
          Notification that free trial is ending with conversion push.
          Focus on converting trial to paid.
        signals:
          - Subject mentions trial, expires, ends
          - Days/time remaining
          - Conversion to paid CTA
          - Feature/benefit reminder
          - What happens after trial
        counter_signals:
          - Paid subscription renewal
          - Trial extension offer
          - Trial just started
        examples:
          - "Your free trial ends in 3 days"
          - "Trial ending soon - upgrade now"
          - "Don't lose your [Product] access"
          - "Convert to paid before trial ends"
          - "Your trial expires tomorrow"
        typical_correlations:
          campaign_goal: drive_purchase, reduce_churn
          urgency_level: moderate, high
          trigger_type: lifecycle
          relationship_stage: onboarding

      trial_extension:
        semantics: |
          Offer to extend trial period, often as win-back for non-converters.
          Second chance at conversion.
        signals:
          - Subject mentions extension, more time
          - Additional trial period offered
          - "Not ready yet? messaging"
          - Limited time extension
          - Reason for extension (feedback, usage)
        counter_signals:
          - Trial expiring (no extension)
          - Standard trial start
          - Paid subscription
        examples:
          - "Need more time? Your trial is extended"
          - "We're giving you 7 more days"
          - "Extension granted: Try us longer"
          - "Not ready? Here's more trial time"
          - "Your trial just got extended"
        typical_correlations:
          campaign_goal: drive_purchase
          tone_of_voice: helpful_supportive
          trigger_type: behavioral

      # ------------------------------------------------------------------------
      # PREVIEW EMAILS
      # ------------------------------------------------------------------------

      early_access:
        semantics: |
          Exclusive preview access before general availability.
          Rewards loyalty with first look/purchase.
        signals:
          - Subject contains "early access", "first look", "before everyone"
          - Exclusivity emphasized
          - Time-limited access window
          - VIP or member status context
          - Early purchase opportunity
        counter_signals:
          - General availability
          - Launch to everyone
          - Waitlist notification
        examples:
          - "Early access starts now"
          - "Shop before everyone else"
          - "VIP preview: 24 hours early access"
          - "First look: New collection"
          - "Members get early access"
        typical_correlations:
          campaign_goal: drive_purchase
          tone_of_voice: exclusive_vip
          relationship_stage: vip, loyalty_member

      sneak_peek:
        semantics: |
          Preview of upcoming products, features, or content.
          Building anticipation without full access.
        signals:
          - Subject contains "sneak peek", "preview", "coming soon"
          - Teaser content, not full access
          - Future availability date
          - Anticipation building
          - "First look at upcoming items"
        counter_signals:
          - Full access/purchase available
          - Already launched
          - Current inventory
        examples:
          - "Sneak peek: Coming next week"
          - "Preview: What's coming"
          - "First look at [upcoming product]"
          - "Coming soon: A preview"
          - "Behind the scenes: Sneak peek"
        typical_correlations:
          campaign_goal: build_brand_awareness
          tone_of_voice: curious_intriguing

      # ------------------------------------------------------------------------
      # COMPANY EMAILS
      # ------------------------------------------------------------------------

      company_announcement:
        semantics: |
