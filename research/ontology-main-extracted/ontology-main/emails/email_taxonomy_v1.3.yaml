        signals:
          - From CEO/founder specifically
          - Personal tone
          - Text-heavy, minimal design
          - Personal signature
          - Direct address to customer
        counter_signals:
          - Marketing team voice
          - Polished design
          - General announcement
        examples:
          - "A note from our founder"
          - "Letter from our CEO"
          - "From [CEO Name]"
          - "A personal message from me"
          - "My thoughts on [topic]"
        typical_correlations:
          campaign_goal: nurture_relationships
          tone_of_voice: friendly_warm, serious_informative
          layout_structure: text_only_minimal
          footer_style: [with_personal_signature]

      # ------------------------------------------------------------------------
      # SERVICE EMAILS
      # ------------------------------------------------------------------------

      appointment_reminder:
        semantics: |
          Reminder about upcoming scheduled appointment or service.
          Logistics and preparation focus.
        signals:
          - Appointment date/time clearly stated
          - Location or access details
          - Preparation instructions if needed
          - Reschedule/cancel options
          - Calendar reference
        counter_signals:
          - Booking confirmation (initial)
          - Service completion follow-up
          - No appointment context
        examples:
          - "Reminder: Your appointment is tomorrow"
