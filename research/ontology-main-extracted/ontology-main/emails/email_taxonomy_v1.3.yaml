  # ==========================================================================
  # DIMENSION 7: MARKET POSITION
  # ==========================================================================

  market_position:
    id: 7
    category: 2
    value_type: single

    definition: |
      The brand's price-value positioning in the market.
      Determines appropriate visual design, messaging tone,
      offer structures, and audience expectations.

    question: What is the brand's market positioning?

    classification_signals:
      - Price points mentioned or implied
      - Visual design quality/complexity
      - Language sophistication
      - Offer type (discounts vs exclusivity)
      - Product positioning (value vs premium)

    generation_guidance: |
      Market position determines appropriate discount strategies,
      design investment, and messaging approach. Budget brands can
      emphasize value; premium brands should avoid heavy discounting.

    correlations:
      strong:
        - design_aesthetic: Premium = sophisticated design
        - brand_personality: Position aligns with personality
        - urgency_level: Budget allows more aggressive urgency
      moderate:
        - visual_density: Premium often sparser
        - typography_style: Position influences type choices
        - color_palette: Premium often more refined

    value_count: 7

    values:
      budget:
        semantics: |
          Lowest price point, value-focused positioning.
          Emphasis on savings and affordability.
        signals:
          - "Lowest price claims"
          - Dollar amounts prominent
          - Savings emphasis
          - No-frills messaging
          - Price comparison focus
        counter_signals:
          - Luxury messaging
          - Premium pricing
          - Quality-first positioning
        examples:
          - Dollar Tree promotions
          - Wish.com emails
          - Budget airline sales
          - Discount store emails
          - Clearance outlet promotions
        typical_correlations:
          design_aesthetic: muted_understated
          urgency_level: high, extreme
          email_type: [clearance_sale, flash_sale]

      value:
        semantics: |
          Good quality at affordable prices.
          Smart choice, quality-to-price ratio emphasis.
        signals:
          - "Great value messaging"
          - Quality + price balance
          - Smart shopper appeal
          - Comparison value
          - "More for less"
        counter_signals:
          - Luxury positioning
          - Budget/cheap emphasis
          - Ultra-premium pricing
        examples:
          - Target promotions
          - IKEA emails
          - Costco member updates
          - Amazon Basics
          - H&M fashion emails
        typical_correlations:
          design_aesthetic: modern
          email_type: [discount_offer, bundle_deal]

      mid_market:
        semantics: |
          Middle-ground positioning, mainstream appeal.
          Balanced value proposition, broad audience.
        signals:
          - Balanced messaging
          - Broad appeal content
          - Standard pricing
          - Quality assurance
          - Mainstream positioning
        counter_signals:
          - Extreme value claims
          - Ultra-luxury positioning
          - Niche targeting
        examples:
          - Gap clothing emails
          - Marriott hotels
          - Toyota automotive
          - Dell computers
          - Macy's retail
        typical_correlations:
          design_aesthetic: modern, corporate_professional
          tone_of_voice: friendly_warm

      premium:
        semantics: |
          Higher quality, higher price positioning.
          Quality-first, discerning customer focus.
        signals:
          - Quality emphasis
          - Premium materials/ingredients
          - Higher price points
          - Exclusive/limited messaging
          - Sophisticated design
        counter_signals:
          - Budget messaging
          - Heavy discounting
          - Mass market appeal
        examples:
          - Nordstrom emails
          - BMW communications
          - Whole Foods market
          - Pottery Barn
          - Anthropologie emails
        typical_correlations:
          design_aesthetic: elegant_sophisticated
          visual_density: sparse, balanced
          brand_personality: professional_polished
          tone_of_voice: exclusive_vip

      luxury:
        semantics: |
          Top-tier, exclusive, aspirational positioning.
          Ultimate quality, status, and exclusivity.
        signals:
          - Luxury branding
          - No discounts/sales
          - Exclusivity emphasis
          - Artisanal/craftsmanship
          - Aspirational imagery
        counter_signals:
          - Price promotions
          - Mass marketing
          - Value messaging
        examples:
          - Hermès communications
          - Tiffany & Co. emails
          - Rolls-Royce updates
          - Four Seasons hospitality
          - Net-a-Porter luxury
        typical_correlations:
          design_aesthetic: luxurious_premium, elegant_sophisticated
          brand_personality: luxurious_premium
          visual_density: ultra_minimal
          typography_style: elegant_thin

