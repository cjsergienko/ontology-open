          trigger_type: lifecycle
          body_sections: [event_details, calendar_widget]

      service_reminder:
        semantics: |
          Reminder for recurring service, maintenance, or check-up.
          Time-based service interval.
        signals:
          - Service interval referenced
          - "Time for or \"due for\" messaging"
          - Last service date
          - Booking/scheduling CTA
          - Maintenance or health context
        counter_signals:
          - Appointment already booked
          - One-time service
          - No interval context
        examples:
          - "Time for your annual checkup"
          - "Your [service] is due"
          - "It's been 6 months since..."
          - "Service reminder: Schedule your [service]"
          - "Your car is due for service"
        typical_correlations:
          campaign_goal: book_appointments
          trigger_type: lifecycle

      # ------------------------------------------------------------------------
      # PRE-ORDER EMAILS
      # ------------------------------------------------------------------------

      pre_order:
        semantics: |
          Opportunity to order before official release/availability.
          Secures purchase ahead of launch.
        signals:
          - Subject contains "pre-order", "reserve", "secure yours"
          - Future availability/ship date
          - Limited quantity messaging
          - Deposit or full payment option
          - Release date mentioned
        counter_signals:
          - In-stock and shipping now
          - Waitlist only
          - General product launch
        examples:
          - "Pre-order now: Ships [Date]"
          - "Reserve your [Product]"
          - "Pre-order open: Be first"
          - "Secure yours: Pre-order today"
          - "Pre-order before it sells out"
        typical_correlations:
          campaign_goal: drive_purchase
          urgency_level: moderate
          body_sections: [single_product, countdown_timer]

  # ==========================================================================
  # DIMENSION 2: CAMPAIGN GOAL
  # ==========================================================================

  campaign_goal:
    id: 2
    category: 1
    value_type: single

    definition: |
      The primary business objective the email campaign is designed to achieve.
      This is the measurable outcome the sender wants from the campaign,
      distinct from email_type which is about content format.

    question: What is the primary goal of this campaign?

    classification_signals:
      - Primary CTA action and destination
      - Content focus and emphasis
      - Success metrics implied (purchases, signups, clicks)
      - Landing page type linked
      - Offer structure and incentives

    generation_guidance: |
      Campaign goal determines CTA design, urgency level, and success metrics.
      Use this dimension to select appropriate persuasion techniques and
      offer structures for generation.

    correlations:
      strong:
        - email_type: Each goal has natural type pairings
        - primary_cta_action: Goal determines CTA verb
        - cta_style: Goal influences CTA prominence
      moderate:
        - urgency_level: Revenue goals allow higher urgency
        - tone_of_voice: Educational goals = instructive tone
        - funnel_stage: Goal aligns with funnel position

    value_count: 21

    values:
      # REVENUE GOALS
      drive_purchase:
        semantics: |
          Primary goal is immediate purchase/transaction completion.
          Success = orders placed, revenue generated.
        signals:
          - "Buy now, Shop, Purchase CTA"
          - Product with pricing displayed
          - Add to cart or checkout flow
          - Discount/offer to incentivize purchase
        counter_signals:
          - Content-only, no products
          - Lead capture form
          - "Learn more as primary CTA"
        examples:
          - Flash sale with "Shop Now" button
          - Abandoned cart with "Complete Purchase"
          - Product launch with "Buy Now"
          - Seasonal sale email
          - Price drop notification
        typical_correlations:
          email_type: [flash_sale, discount_offer, abandoned_cart, product_launch]
          primary_cta_action: purchase, add_to_cart
          urgency_level: moderate, high

      increase_order_value:
        semantics: |
          Goal is larger transaction size (AOV), not just purchase.
          Success = higher average order value.
        signals:
          - Bundle offers
          - "Add to your order"
          - Free shipping threshold
          - "Frequently bought together"
          - Cross-sell/upsell product suggestions
        counter_signals:
          - Single product focus
          - No bundle/threshold incentive
          - General brand awareness
        examples:
          - "Free shipping when you add $20 more"
          - Post-purchase cross-sell
          - Bundle deal promotion
          - "Complete the look suggestions"
          - BOGO offer
        typical_correlations:
          email_type: [cross_sell_upsell, bundle_deal, bogo_offer]
          body_sections: [bundle_offer, product_grid]

      # ACQUISITION GOALS
      generate_leads:
        semantics: |
          Goal is capturing lead information for nurturing.
          Success = form submissions, lead database growth.
        signals:
          - Lead capture form
          - Gated content (download, webinar)
          - "Get started or \"Learn more\" CTA"
          - No immediate purchase ask
          - B2B context often
        counter_signals:
          - E-commerce purchase flow
          - Existing customer context
          - Transactional email
        examples:
          - Webinar registration email
          - Ebook/whitepaper download offer
          - Free consultation booking
          - Demo request
          - Newsletter signup with incentive
        typical_correlations:
          email_type: [webinar_invitation, educational_content, case_study]
          business_model: b2b, saas
          funnel_stage: awareness, interest

      drive_signups:
        semantics: |
          Goal is account creation or registration.
          Success = new accounts, registrations.
        signals:
          - "Sign up, Create account, Register CTA"
          - Account benefits emphasized
          - Onboarding context
          - Free tier or trial mention
        counter_signals:
          - Existing account context
          - Purchase focus
          - Content only
        examples:
          - Free trial signup promotion
          - App download with account creation
          - Membership program enrollment
          - Platform registration
          - Community join invitation
        typical_correlations:
          email_type: [activation, welcome]
          primary_cta_action: signup
          relationship_stage: new_subscriber

      grow_email_list:
        semantics: |
          Goal is expanding subscriber base.
          Success = new email subscribers.
        signals:
          - Newsletter signup form/CTA
          - "Subscribe language"
          - Email-specific value proposition
          - Content preview
        counter_signals:
          - Sent to existing subscribers
          - Account creation focus
          - Purchase focus
        examples:
          - "Subscribe for weekly tips"
          - Social media to email conversion
          - Content preview with subscribe CTA
          - Referral to subscribe
          - Pop-up follow-up email
        typical_correlations:
          email_type: [newsletter, content_digest]
          primary_cta_action: subscribe

      drive_downloads:
        semantics: |
          Goal is app or content downloads.
          Success = download count, install rate.
        signals:
          - App store badges (iOS, Android)
          - "Download CTA"
          - App screenshot or demo
          - QR code for mobile download
          - PDF/resource download
        counter_signals:
          - Web-only experience
          - No download action
          - Purchase focus
        examples:
          - Mobile app promotion
          - Ebook/whitepaper download
          - Software download
          - Podcast episode download
          - Resource kit download
        typical_correlations:
          body_sections: [app_store_badges, app_screenshot, qr_code]
          primary_cta_action: download

      encourage_referrals:
        semantics: |
          Goal is generating customer referrals.
          Success = referral link shares, referred signups.
        signals:
          - Referral program promotion
          - "Give X, Get X structure"
          - Shareable link or code
          - Social sharing buttons
          - "Invite friends language"
        counter_signals:
          - No referral mechanism
          - Self-purchase focus
          - B2B context typically
        examples:
          - Referral program launch
          - Referral milestone celebration
          - "Share the love campaign"
          - Post-purchase referral ask
          - Member-get-member program
        typical_correlations:
          email_type: [referral_program, referral_thank_you]
          body_sections: [referral_reward]
          relationship_stage: loyal_customer

      # ENGAGEMENT GOALS
      drive_website_traffic:
        semantics: |
          Goal is generating website visits.
          Success = click-through rate, sessions, page views.
        signals:
          - Multiple click-through opportunities
          - Content teasers with "Read more"
          - Blog/article links
          - Category browsing encouraged
        counter_signals:
          - Complete information in email
          - Single product focus
          - In-email form completion
        examples:
          - Blog post digest
          - "New on the site roundup"
          - Category spotlight
          - Content hub promotion
          - New features on website
        typical_correlations:
          email_type: [newsletter, content_digest, new_arrival]
          copy_length: brief

      drive_social_engagement:
        semantics: |
          Goal is social media interaction.
          Success = follows, likes, shares, comments.
        signals:
          - Social media links prominent
          - "Follow us CTA"
          - UGC request with hashtag
          - Social proof from social media
          - Platform-specific CTAs
        counter_signals:
          - No social media links
          - Email/website only focus
          - Purchase primary goal
        examples:
          - "Follow us on Instagram"
          - Hashtag campaign launch
          - Social contest promotion
          - "Share your experience"
          - Social milestone celebration
        typical_correlations:
          email_type: [ugc_request]
          body_sections: [social_feed, ugc_gallery]

      increase_email_engagement:
        semantics: |
          Goal is improving email program metrics.
          Success = opens, clicks, replies, forwards.
        signals:
          - Interactive elements
          - Poll or quiz
          - Reply request
          - Forward to friend suggestion
          - Preference update prompt
        counter_signals:
          - Single link focus
          - Transactional content
          - Purchase-driven
        examples:
          - Interactive poll email
          - Preference center update
          - "Reply to this email ask"
          - Re-engagement survey
          - Quiz or game email
        typical_correlations:
          email_type: [poll, quiz, survey_feedback]
          body_sections: [poll_preview, quiz_teaser]

      drive_event_attendance:
        semantics: |
          Goal is event registration or attendance.
          Success = registrations, attendance rate.
        signals:
          - Event details (date, time, location)
          - Registration CTA
          - Speaker/agenda information
          - Calendar add option
          - "Join us or \"Register\" language"
        counter_signals:
          - No event context
          - Post-event
          - Product purchase focus
        examples:
          - Webinar invitation
          - Conference registration
          - Workshop signup
          - Store event promotion
          - Virtual event registration
        typical_correlations:
          email_type: [event_invitation, webinar_invitation, conference]
          body_sections: [event_details, rsvp_button, calendar_widget]
          primary_cta_action: register

      # RETENTION GOALS
      reduce_churn:
        semantics: |
          Goal is preventing customer/subscriber loss.
          Success = retention rate, reduced cancellations.
        signals:
          - Win-back offer
          - "Don't leave us messaging"
          - Feedback request
          - Subscription renewal
          - Value reminder
        counter_signals:
          - New customer context
          - Acquisition focus
          - Upsell context
        examples:
          - Subscription renewal reminder
          - Win-back campaign
          - "We miss you email"
          - Sunset email before removal
          - Cancellation prevention offer
        typical_correlations:
          email_type: [re_engagement, win_back, sunset, renewal_reminder]
          relationship_stage: at_risk, lapsed

      reactivate_users:
        semantics: |
          Goal is bringing back dormant/inactive users.
          Success = reactivation rate, return visits.
        signals:
          - Inactivity acknowledged
          - "Come back messaging"
          - What's new since they left
          - Reactivation incentive
          - Re-engagement offer
        counter_signals:
          - Active user context
          - No absence mention
          - New user onboarding
        examples:
          - "We miss you with discount"
          - "See what's new to inactive"
          - Account reactivation prompt
          - Usage reminder
          - "It's been a while campaign"
        typical_correlations:
          email_type: [re_engagement, win_back]
          relationship_stage: lapsed, dormant, at_risk

      nurture_relationships:
        semantics: |
          Goal is strengthening customer relationship without direct ask.
          Success = engagement, sentiment, NPS.
        signals:
          - Value-first content
          - No hard sell
          - Thank you messaging
          - Tips, education, entertainment
          - Personalized content
        counter_signals:
          - Heavy promotional
          - Strong sales ask
          - Urgency-driven
        examples:
          - Thank you email
          - Birthday message
          - Anniversary celebration
          - Tips and tricks content
          - Customer appreciation
        typical_correlations:
          email_type: [thank_you, birthday, anniversary, newsletter]
          tone_of_voice: friendly_warm, grateful_appreciative

      increase_loyalty_enrollment:
        semantics: |
          Goal is loyalty program signups.
          Success = new loyalty members.
        signals:
          - Loyalty program promotion
          - Benefits explanation
          - "Join now for loyalty"
          - Points/rewards preview
          - Member perks highlighted
        counter_signals:
          - Already a member context
          - No loyalty program mention
          - General purchase focus
        examples:
          - Loyalty program launch
          - "Join rewards program"
          - Member benefit preview
          - VIP tier promotion
          - Points earning opportunity
        typical_correlations:
          email_type: [loyalty_program, vip_exclusive]
          body_sections: [loyalty_points]

      # BRAND GOALS
      build_brand_awareness:
        semantics: |
          Goal is brand recognition and recall.
          Success = brand metrics, recall, recognition.
        signals:
          - Brand story/values content
          - Behind-the-scenes
          - Mission/purpose messaging
          - Founder story
          - Brand campaign creative
        counter_signals:
          - Product/sales focus
          - Transactional content
          - Generic promotional
        examples:
          - Brand story email
          - Values/mission highlight
          - Sustainability commitment
          - Company origin story
          - Brand campaign launch
        typical_correlations:
          email_type: [company_announcement, ceo_letter]
          tone_of_voice: inspiring_motivational

      announce_news:
        semantics: |
          Goal is communicating news/updates.
          Success = awareness, comprehension of news.
        signals:
          - News-style headline
          - Announcement format
          - "Just announced language"
          - Company update content
          - Change notification
        counter_signals:
          - Promotional focus
          - Sales messaging
          - Evergreen content
        examples:
          - Product announcement
          - Company news
          - Policy change notification
          - New partnership
          - Executive change
        typical_correlations:
          email_type: [company_announcement, product_launch, feature_announcement]
          tone_of_voice: formal_professional

      educate_audience:
        semantics: |
          Goal is teaching/informing the audience.
          Success = learning, skill development.
        signals:
          - How-to content
          - Tutorial or guide
          - Tips and tricks
          - Educational framing
          - Learning-focused CTA
        counter_signals:
          - Product sales focus
          - News/announcement
          - Entertainment only
        examples:
          - How-to guide email
          - Tips series
          - Tutorial content
          - Industry insights
          - Best practices guide
        typical_correlations:
          email_type: [educational_content, onboarding]
          tone_of_voice: educational_instructive
          copy_length: detailed, long_form

      # FEEDBACK GOALS
      collect_feedback:
        semantics: |
          Goal is gathering customer opinions/feedback.
          Success = survey completion, feedback volume.
        signals:
          - Survey or feedback link
          - Opinion request
          - "Tell us what you think"
          - Rating mechanism
          - Feedback form
        counter_signals:
          - Review request (public)
          - No feedback mechanism
          - Information push only
        examples:
          - Customer satisfaction survey
          - Product feedback request
          - NPS survey email
          - Feature request collection
          - Experience feedback
        typical_correlations:
          email_type: [survey_feedback]
          body_sections: [survey_preview]

      request_reviews:
