          body_sections: [calendar_widget]

  # ==========================================================================
  # DIMENSION 3: FUNNEL STAGE
  # ==========================================================================

  funnel_stage:
    id: 3
    category: 1
    value_type: single

    definition: |
      The recipient's position in the customer journey/marketing funnel.
      This determines appropriate messaging intensity, content depth,
      and call-to-action aggressiveness.

    question: Where in the funnel is the recipient?

    classification_signals:
      - Relationship context (new vs returning)
      - Content sophistication and depth
      - CTA directness and ask level
      - Assumed knowledge about product/brand
      - Offer aggressiveness

    generation_guidance: |
      Funnel stage dictates messaging strategy. Early stages need education
      and trust-building. Later stages can be more direct with asks.
      Match content depth to stage expectations.

    correlations:
      strong:
        - relationship_stage: Maps closely to funnel position
        - email_type: Certain types align to stages
        - urgency_level: Higher urgency appropriate later
      moderate:
        - tone_of_voice: More casual early, more direct late
        - copy_length: More education early, more concise late
        - social_proof_type: Different proof for different stages

    value_count: 8

    values:
      awareness:
        semantics: |
          Top of funnel - prospect just discovering the brand.
          Focus on brand introduction and value proposition.
          No assumption of prior knowledge.
        signals:
          - Brand introduction content
          - "Who we are messaging"
          - Educational/informational focus
          - Soft CTAs (Learn more vs Buy now)
          - Broad audience targeting
        counter_signals:
          - Assumes product familiarity
          - Hard sales ask
          - Loyalty/retention context
          - Order history references
        examples:
          - Newsletter signup welcome sequence
          - Brand story email
          - "Why [Brand] introduction"
          - Content marketing to new audience
          - Social media follower nurture
        typical_correlations:
          email_type: [welcome, educational_content, company_announcement]
          campaign_goal: build_brand_awareness, educate_audience
          copy_length: moderate, detailed
          urgency_level: none, soft

      interest:
        semantics: |
          Prospect has shown interest, exploring options.
          Focus on differentiation and value demonstration.
          Building engagement and preference.
        signals:
          - Content engagement context
          - Product/service exploration
          - Comparison information
          - Case studies and proof points
          - Newsletter engagement
        counter_signals:
          - First contact
          - Purchase intent signals
          - Customer retention context
        examples:
          - Blog reader nurture
          - Feature highlight series
          - Competitor comparison content
          - Free resource download follow-up
          - Industry insights
        typical_correlations:
          email_type: [educational_content, case_study, newsletter]
          campaign_goal: generate_leads, educate_audience
          social_proof_type: [case_study, media_mentions]

      consideration:
        semantics: |
          Actively evaluating product/service for purchase.
          Focus on overcoming objections and proving value.
          More direct product information.
        signals:
          - Product deep-dive content
          - Comparison/pricing content
          - Demo or trial offers
          - Objection handling
          - Detailed features
        counter_signals:
          - General brand awareness
          - Existing customer context
          - No product specifics
        examples:
          - Product comparison email
          - Demo invitation
          - Detailed feature breakdown
          - Pricing information
          - ROI calculator
        typical_correlations:
          email_type: [product_launch, webinar_invitation, case_study]
          campaign_goal: generate_leads, drive_purchase
          social_proof_type: [testimonial_quote, case_study]

      intent:
        semantics: |
          High purchase intent, ready to buy decision.
          Focus on conversion assistance and friction removal.
          Direct sales messaging appropriate.
        signals:
          - Cart activity
          - Pricing engagement
          - Trial nearing end
          - Direct purchase CTAs
          - Incentives to convert
        counter_signals:
          - Educational content focus
          - No product specifics
          - Brand awareness context
        examples:
          - Abandoned cart email
          - Trial expiring
          - Pricing follow-up
          - Quote follow-up
          - Decision-stage nurture
        typical_correlations:
          email_type: [abandoned_cart, trial_expiring, price_drop_alert]
          campaign_goal: drive_purchase
          urgency_level: moderate, high
          primary_cta_action: purchase, add_to_cart

      purchase:
        semantics: |
          Just completed purchase, confirmation and onboarding.
          Focus on confirmation, satisfaction, and next steps.
          Transition from prospect to customer.
        signals:
          - Order/purchase confirmation
          - Thank you messaging
          - What to expect next
          - Getting started info
          - Cross-sell introduction
        counter_signals:
          - Pre-purchase context
          - Lead nurturing
          - Win-back context
        examples:
          - Order confirmation
          - Welcome to customer status
          - Purchase thank you
          - Onboarding kickoff
          - What's next email
        typical_correlations:
          email_type: [order_confirmation, welcome, onboarding]
          campaign_goal: nurture_relationships
          trigger_type: transactional

      retention:
        semantics: |
          Active customer, focus on keeping engaged.
          Balance value delivery with growth opportunities.
          Relationship maintenance phase.
        signals:
          - Existing customer context
          - Value-add content
          - Usage tips
          - Cross-sell/upsell
          - Engagement maintenance
        counter_signals:
          - Acquisition messaging
          - Win-back/reactivation
          - New user onboarding
        examples:
          - Customer newsletter
          - Product tips and tricks
          - Cross-sell recommendation
          - Usage milestone
          - Feature education
        typical_correlations:
          email_type: [newsletter, product_recommendation, cross_sell_upsell]
          campaign_goal: nurture_relationships, increase_order_value
          relationship_stage: active_engaged

      loyalty:
        semantics: |
          High-value repeat customer, VIP treatment.
          Focus on recognition and exclusive benefits.
          Reward and strengthen relationship.
        signals:
          - VIP/member status
          - Exclusive offers
          - Loyalty program content
          - Early access
          - Premium treatment
        counter_signals:
          - New customer treatment
          - General promotional
          - Acquisition messaging
        examples:
          - VIP exclusive offer
          - Loyalty tier upgrade
          - Member appreciation
          - Early access invitation
          - Top customer thank you
        typical_correlations:
          email_type: [vip_exclusive, loyalty_program, early_access]
          campaign_goal: nurture_relationships
          relationship_stage: vip, loyal_customer
          tone_of_voice: exclusive_vip

      advocacy:
        semantics: |
          Customer ready to promote brand, referral stage.
          Focus on enabling and rewarding advocacy.
          Turning customers into promoters.
        signals:
          - Referral program content
          - Share/invite friends
          - UGC requests
          - Testimonial requests
          - Ambassador program
        counter_signals:
          - New customer
          - Retention risk
          - Transactional only
        examples:
          - Referral program invitation
          - Review request
          - UGC campaign
          - Ambassador program invite
          - Share incentive
        typical_correlations:
          email_type: [referral_program, review_request, ugc_request]
          campaign_goal: encourage_referrals, request_reviews
          relationship_stage: loyal_customer, vip

