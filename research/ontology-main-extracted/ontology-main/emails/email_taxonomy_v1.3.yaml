        observable_signals:
          patterns:
            - "Order/confirmation/receipt number present"
            - "Account-specific references"
            - "Action completion confirmation"
            - "'Your recent...' language"
        examples:
          - Order confirmation
          - Shipping notification
          - Password reset
          - Account verification
          - Receipt emails
        typical_correlations:
          email_type: [order_confirmation, shipping_notification, password_reset]
          personalization_level: moderate, advanced

      promotional:
        semantics: |
          Promotional campaign, typically scheduled.
          Marketing-driven, sales-focused.
        signals:
          - Promotional content
          - Marketing campaign
          - Scheduled send
          - Sales messaging
        counter_signals:
          - Transaction-triggered
          - Behavioral trigger
          - Personal event
        observable_signals:
          patterns:
            - "Date-specific offers ('This weekend only')"
            - "General promotional language"
            - "No personalization beyond name"
        examples:
          - Flash sales
          - Seasonal campaigns
          - Product launches
          - Discount offers
          - Marketing emails
        typical_correlations:
          email_type: [flash_sale, product_launch]
          campaign_goal: drive_purchase

      lifecycle:
        semantics: |
