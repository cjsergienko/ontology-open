  # ==========================================================================
  # DIMENSION 26: URGENCY LEVEL
  # ==========================================================================

  urgency_level:
    id: 26
    category: 6
    value_type: single

    definition: |
      The level of time-pressure or urgency communicated.
      Affects recipient psychology and conversion rates.
      Can boost action but damages trust if overused.

    question: What level of urgency is conveyed?

    classification_signals:
      - Time-limit language
      - Countdown presence
      - Scarcity messaging
      - Deadline emphasis
      - FOMO techniques

    generation_guidance: |
      Urgency must be genuine - fake urgency damages brand trust.
      Match urgency to email_type - flash sales allow extreme;
      newsletters should be none. Brand personality constrains options.

    correlations:
      strong:
        - email_type: Type determines appropriate urgency
        - campaign_goal: Sales goals allow more urgency
        - tone_of_voice: Urgency affects tone
      moderate:
        - brand_personality: Luxury brands avoid high urgency
        - market_position: Budget allows more aggressive
        - body_sections: Urgency sections present

    value_count: 5

    values:
      none:
        semantics: |
          No urgency, evergreen content.
          Timeless, no pressure, relaxed.
        signals:
          - No deadlines
          - No time limits
          - Evergreen content
          - Relaxed pacing
        counter_signals:
          - Any time pressure
          - Deadline mentions
          - Scarcity language
        examples:
          - Newsletters
          - Educational content
          - Brand awareness
          - Transactional
          - Relationship building
        typical_correlations:
          email_type: [newsletter, educational_content]
          campaign_goal: nurture_relationships

      soft:
        semantics: |
          Mild suggestion of timeliness.
          Gentle nudge, not pressure.
        signals:
          - "Soon, Don't forget"
          - Soft reminders
          - Gentle nudge
          - No hard deadline
        counter_signals:
          - No time reference
          - Hard deadlines
          - Strong pressure
        examples:
          - Cart reminders
          - Soft promotions
          - Gentle nudges
          - Friendly reminders
          - Light suggestions
        typical_correlations:
          email_type: [abandoned_cart]
          tone_of_voice: friendly_warm

      moderate:
        semantics: |
          Clear time-frame, reasonable pressure.
          Deadline stated but not aggressive.
        signals:
          - Specific deadline
          - "Ends [date]"
          - Reasonable timeframe
          - Clear but not pushy
        counter_signals:
          - No deadline
          - Extreme pressure
          - Evergreen
        examples:
          - Standard sales
          - Offer with deadline
          - Event registration
          - Seasonal promotions
          - Limited time offers
        typical_correlations:
          email_type: [seasonal_sale, discount_offer]

      high:
        semantics: |
          Strong urgency, imminent deadline.
          Significant pressure, act now messaging.
        signals:
          - "Last chance, Almost over"
          - 24-48 hour deadline
          - Strong scarcity
          - Urgency language
        counter_signals:
          - Relaxed timing
          - No pressure
          - Evergreen
        examples:
          - Sale ending emails
          - Cart urgency
          - Trial expiring
          - Limited stock
          - Time-sensitive offers
        typical_correlations:
          email_type: [flash_sale, trial_expiring]
          body_sections: [countdown_timer, limited_stock]

      extreme:
        semantics: |
          Maximum urgency, final hours.
          "Now or never" messaging.
        signals:
          - "Final hours"
          - "Ends tonight"
          - Extreme scarcity
          - Maximum pressure
          - All caps/exclamation
        counter_signals:
          - Any relaxed tone
          - Future timeframe
        examples:
          - Last hour flash sale
          - Final countdown
          - Absolute last chance
          - Sold out warning
          - Extreme scarcity
        typical_correlations:
          email_type: [flash_sale]
          tone_of_voice: urgent_time_sensitive

