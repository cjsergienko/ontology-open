          - Personal style
        typical_correlations:
          hero_treatment: no_hero
          email_type: [ceo_letter, password_reset]

# ============================================================================
# CROSS-DIMENSION CORRELATION MATRIX
# ============================================================================
# This section documents the relationships between dimensions to enable:
# 1. Better classification (if X then likely Y)
# 2. Generation validation (ensure consistency)
# 3. Retrieval optimization (related examples)
# ============================================================================

correlation_matrix:
  description: |
    Documents correlations between dimensions for classification and generation.
    Correlation strength: strong (0.7+), moderate (0.4-0.7), weak (0.2-0.4)

  # Primary correlation chains - dimensions that strongly predict each other
  primary_chains:
    
    - name: Email Type Chain
      description: Email type is the primary driver of many other dimensions
      chain:
        - email_type → body_sections (0.85)
        - email_type → campaign_goal (0.80)
        - email_type → trigger_type (0.75)
        - email_type → primary_cta_action (0.75)
        - email_type → layout_structure (0.70)
      guidance: |
        Start classification with email_type as it determines the most
        downstream dimensions. For generation, select email_type first
        then filter by correlated dimensions.

    - name: Brand Chain
      description: Brand attributes form a coherent cluster
      chain:
        - brand_personality → tone_of_voice (0.80)
        - brand_personality → design_aesthetic (0.75)
        - market_position → visual_density (0.70)
        - market_position → urgency_level (0.65)
      guidance: |
        Brand dimensions should be consistent. Luxurious_premium brand
        should have elegant_sophisticated aesthetic, exclusive_vip tone,
        and low urgency. Budget brands can use high urgency.

    - name: Audience Chain
      description: Audience dimensions influence presentation
      chain:
        - audience_age_group → design_aesthetic (0.70)
        - audience_sophistication → copy_length (0.65)
        - relationship_stage → personalization_level (0.75)
        - funnel_stage → social_proof_type (0.70)
      guidance: |
        Match presentation to audience. Gen Z expects modern design;
        new subscribers need simpler personalization; consideration
        stage needs strong social proof.

  # Constraint relationships - certain values exclude others
  constraints:

    - dimension_a: market_position
      value_a: luxury
      dimension_b: urgency_level
      excluded_values: [extreme, high]
      reason: Luxury brands don't use aggressive urgency

    - dimension_a: brand_personality
      value_a: minimalist_focused
      dimension_b: visual_density
      excluded_values: [dense, content_rich]
      reason: Minimalist brands have sparse designs

    - dimension_a: email_type
      value_a: password_reset
      dimension_b: urgency_level
      excluded_values: [extreme, high]
      reason: Security emails use calm, clear communication

    - dimension_a: business_model
      value_a: luxury
      dimension_b: email_type
      excluded_values: [clearance_sale, flash_sale]
      reason: Luxury brands avoid discount-heavy email types

  # Typical co-occurrence patterns for generation
  cooccurrence_patterns:

    # ========== PROMOTIONAL PATTERNS ==========
    flash_sale_pattern:
      email_type: flash_sale
      typical_values:
        campaign_goal: drive_purchase
        urgency_level: high, extreme
        trigger_type: promotional
        tone_of_voice: urgent_time_sensitive
        body_sections: [countdown_timer, product_grid, limited_stock]
        hero_treatment: countdown_timer
        cta_style: with_urgency_text
        primary_cta_action: purchase

    promotional_sale_pattern:
      email_type: promotional_sale
      typical_values:
        campaign_goal: drive_purchase
        urgency_level: medium, high
        trigger_type: promotional
        tone_of_voice: persuasive_compelling
        body_sections: [product_grid, discount_banner, social_proof]
        cta_style: standard_cta, colored_button
        primary_cta_action: purchase
        personalization_level: segment_based

    seasonal_sale_pattern:
      email_type: seasonal_sale
      typical_values:
        campaign_goal: drive_purchase
        urgency_level: medium
        trigger_type: promotional
        tone_of_voice: festive_celebratory
        body_sections: [product_grid, seasonal_messaging, discount_banner]
        cta_style: standard_cta, colored_button
        primary_cta_action: purchase
        send_frequency: occasional

    clearance_sale_pattern:
      email_type: clearance_sale
      typical_values:
        campaign_goal: drive_purchase
        urgency_level: medium, high
        trigger_type: promotional
        tone_of_voice: urgent_time_sensitive
        body_sections: [product_grid, limited_stock, savings_highlight]
