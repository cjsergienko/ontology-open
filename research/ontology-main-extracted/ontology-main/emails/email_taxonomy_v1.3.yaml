      Relationship stage dictates messaging approach. New subscribers
      need trust-building. VIPs expect recognition. At-risk need
      re-engagement. Match examples to target relationship stage.

    correlations:
      strong:
        - funnel_stage: Direct mapping to funnel position
        - email_type: Stage determines appropriate types
        - personalization_level: Longer relationships = more data
      moderate:
