          - Typical e-commerce
          - Balanced newsletters
          - Normal campaigns
        typical_correlations:
          visual_density: balanced

      text_primary:
        semantics: |
          70%+ text, supporting images.
          Copy-focused, text-driven.
        signals:
          - Text-dominant
          - Supporting images
          - Copy-focused
          - High text density
        examples:
