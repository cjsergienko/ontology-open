  # ==========================================================================

  # ==========================================================================
  # DIMENSION 24: TONE OF VOICE
  # ==========================================================================

  tone_of_voice:
    id: 24
    category: 6
    value_type: single

    definition: |
      The communicative tone and emotional register of the email.
      Distinct from brand_personality - tone is email-specific
      while personality is stable across all communications.
      A playful brand can use urgent tone for a flash sale.

    question: What tone does this email use?

    classification_signals:
      - Word choice and vocabulary
      - Sentence structure
      - Emotional register
      - Formality level
      - Urgency markers

    generation_guidance: |
      Tone must be constrained by brand_personality but can vary
      by email context. Educational emails use instructive tone;
      sales use urgent. Match tone to email_type and goal.

    correlations:
      strong:
        - brand_personality: Personality constrains tone options
        - email_type: Type suggests appropriate tones
        - urgency_level: High urgency = urgent tone
      moderate:
        - funnel_stage: Stage affects appropriate tone
        - audience_sophistication: Affects formality
        - copy_length: Tone affects verbosity

    classification_decision_tree:
      question_1: "Does the email use slang, emojis, or very informal language?"
      yes_branch: casual_conversational
      no_branch: question_2

      question_2: "Is the language warm but grammatically standard?"
      yes_branch: friendly_warm
      no_branch: question_3

      question_3: "Does it use formal business language with industry terminology?"
      yes_branch: formal_professional
      no_branch: question_4

      question_4: "Does it convey expertise and authority?"
      yes_branch: authoritative_expert
      no_branch: question_5

      question_5: "Does it create urgency with time-sensitive language?"
      yes_branch: urgent_time_sensitive
      no_branch: helpful_supportive

    value_count: 20

    values:
      formal_professional:
        semantics: |
          Business-appropriate, professional language.
          Proper, respectful, corporate-suitable.
        signals:
          - Formal vocabulary
          - Complete sentences
          - Professional greetings
          - No slang/contractions
          - Business language
        counter_signals:
          - Casual language
          - Slang/emojis
          - Incomplete sentences
        examples:
          - B2B communications
          - Financial services
          - Legal updates
          - Executive correspondence
          - Enterprise sales
        typical_correlations:
          brand_personality: professional_polished
          business_model: b2b
          audience_profession: c_suite

      casual_conversational:
        semantics: |
          Friendly, everyday language.
          Natural, approachable, relaxed.
        signals:
          - Contractions
          - Conversational phrasing
          - Friendly language
          - Natural flow
          - Approachable voice
        counter_signals:
          - Formal language
          - Corporate speak
          - Stiff phrasing
        examples:
          - D2C brands
          - Lifestyle products
          - Friendly retail
          - Consumer apps
          - Casual updates
        typical_correlations:
          brand_personality: friendly_approachable
          audience_age_group: millennial, gen_z

      friendly_warm:
        semantics: |
          Warm, personable, caring communication.
          Personal touch, relationship-focused.
        signals:
          - Warm greetings
          - Personal touches
          - Caring language
          - Relationship focus
          - Inclusive pronouns
        counter_signals:
          - Cold/distant
          - Purely transactional
          - Impersonal language
        examples:
          - Welcome emails
          - Thank you notes
          - Customer appreciation
          - Birthday messages
          - Relationship building
        typical_correlations:
          email_type: [welcome, thank_you, birthday]
          campaign_goal: nurture_relationships

      urgent_time_sensitive:
        semantics: |
          Urgency-driven, time-pressure communication.
          Creates FOMO, demands immediate action.
        signals:
          - Time references
          - "Hurry, Don't miss"
          - Deadline emphasis
          - Scarcity language
          - Exclamation points
        counter_signals:
          - Relaxed pacing
          - "Take your time"
          - No deadlines
        examples:
          - Flash sales
          - Expiring offers
          - Cart abandonment
          - Limited time deals
          - Last chance emails
        typical_correlations:
          urgency_level: high, extreme
          email_type: [flash_sale]

      celebratory:
        semantics: |
          Joyful, celebrating an occasion.
          Festive, excited, congratulatory.
        signals:
          - Celebration language
          - Congratulations
          - Achievement focus
          - Festive elements
          - Joy expression
        counter_signals:
          - Neutral/flat tone
          - Problem-focused
          - Serious content
        examples:
          - Birthday emails
          - Anniversary celebrations
          - Milestone achievements
          - Holiday greetings
