    id: 5
    category: 2
    value_type: single

    definition: |
      The fundamental business structure defining how the sender creates
      and delivers value. Affects audience expectations, sales cycle,
      and communication patterns.

    question: What is the sender's business model?

    classification_signals:
      - Customer type (business vs consumer)
      - Transaction structure (one-time vs recurring)
      - Fulfillment model (physical vs digital)
      - Pricing structure visible
      - Sales cycle length implied

    generation_guidance: |
      Business model determines appropriate conversion paths, pricing
      communication, and relationship-building approach. B2B needs longer
      nurture; subscription focuses on retention; e-commerce on transactions.

    correlations:
      strong:
        - email_type: B2B has different type distribution than B2C
        - campaign_goal: Model determines relevant goals
        - audience_profession: B2B targets professional roles
      moderate:
        - tone_of_voice: B2B more formal typically
        - copy_length: B2B often longer form
        - social_proof_type: B2B uses case studies, B2C uses reviews

    value_count: 15

    values:
      b2b:
        semantics: |
          Business selling to other businesses.
          Longer sales cycles, multiple stakeholders, value-based selling.
        signals:
          - Company/role targeting
          - Business value propositions
          - Enterprise terminology
          - Case studies/ROI focus
          - Demo/trial offers
        counter_signals:
          - Consumer pricing
          - Add to cart
          - Personal benefit focus
        examples:
          - Enterprise software pitch
          - Consulting service offer
          - Trade publication
          - B2B SaaS onboarding
          - Professional service promotion
        typical_correlations:
          tone_of_voice: formal_professional
          copy_length: detailed
          campaign_goal: generate_leads
          email_type: [case_study, webinar_invitation]

      b2c:
        semantics: |
          Business selling directly to consumers.
          Shorter cycles, emotional appeals, individual decision-making.
        signals:
          - Consumer pricing
          - Personal benefit focus
          - Emotional appeals
          - Add to cart CTAs
          - Consumer testimonials
        counter_signals:
          - Enterprise features
          - B2B terminology
          - Multi-stakeholder messaging
        examples:
          - Retail promotional email
          - Consumer app promotion
          - Personal service offer
          - Consumer subscription
          - Flash sale announcement
        typical_correlations:
          tone_of_voice: casual_conversational
          urgency_level: moderate, high
          email_type: [flash_sale, product_launch]

      b2b2c:
        semantics: |
          Business selling through business partners to consumers.
          Hybrid approach, partner enablement focus.
        signals:
          - Partner program content
          - Channel sales language
          - End-consumer and partner messaging
          - Reseller/distributor references
        counter_signals:
          - Direct consumer only
          - Pure B2B enterprise
        examples:
          - Partner newsletter
          - Channel program update
          - Reseller enablement
          - Franchise communication
          - Distribution partner offer
        typical_correlations:
          email_type: [company_update, educational_content]

      d2c:
        semantics: |
          Direct-to-consumer brand bypassing retail.
          Brand story emphasis, community building.
        signals:
          - Brand story prominence
          - Direct relationship emphasis
          - "Made by us messaging"
          - Community focus
          - Founder personality
        counter_signals:
          - Retail/store locations
          - Third-party resellers
          - White-label products
        examples:
          - DTC brand story
          - Founder letter
          - Community email
          - Direct brand promotion
          - Subscriber exclusive
        typical_correlations:
          tone_of_voice: friendly_warm
          brand_personality: down_to_earth_authentic
          email_type: [ceo_letter, vip_exclusive]

      saas:
        semantics: |
          Software-as-a-Service subscription model.
          Feature-focused, onboarding-heavy, retention-critical.
        signals:
          - Feature announcements
          - Trial/freemium offers
          - Usage metrics
          - Onboarding content
          - Subscription management
        counter_signals:
          - Physical products
          - One-time purchase
          - Download-only software
        examples:
          - Feature release email
          - Trial expiring notice
          - Onboarding sequence
          - Usage milestone
          - Subscription renewal
        typical_correlations:
          email_type: [feature_announcement, onboarding, trial_expiring]
          campaign_goal: reduce_churn
          design_aesthetic: modern, tech_futuristic

      ecommerce:
        semantics: |
          Online retail selling physical/digital products.
          Transaction-focused, inventory-driven.
        signals:
          - Product catalogs
          - Shopping cart references
          - Shipping/fulfillment info
          - Inventory messaging
          - Price promotions
        counter_signals:
          - Service-only
          - Subscription-first
          - Enterprise sales
        examples:
          - Product launch email
          - Cart abandonment
          - Sale announcement
          - New arrivals email
          - Shipping notification
        typical_correlations:
          email_type: [product_launch, abandoned_cart, flash_sale]
          body_sections: [product_grid]
          campaign_goal: drive_purchase

      marketplace:
        semantics: |
          Platform connecting buyers and sellers.
          Two-sided messaging, platform value proposition.
        signals:
          - Seller/buyer dual messaging
          - Platform features
          - Transaction facilitation
          - Multiple vendor products
          - Marketplace terms
        counter_signals:
          - Single brand
          - Direct sales
          - Service provider
        examples:
          - Marketplace updates
          - Seller notification
          - Buyer recommendations
          - Platform feature launch
          - Seller performance email
        typical_correlations:
          email_type: [product_recommendation]

      subscription:
        semantics: |
          Recurring subscription model (boxes, content, services).
          Retention-focused, recurring value emphasis.
        signals:
          - Subscription terminology
          - Recurring billing references
          - Membership language
          - Renewal reminders
          - Box/delivery content
        counter_signals:
          - One-time purchase
          - No recurring element
          - Transaction-only
        examples:
          - Subscription box preview
          - Renewal reminder
          - Membership benefits
          - Subscriber exclusive
          - Pause/skip options
        typical_correlations:
          email_type: [renewal_reminder, vip_exclusive]
          campaign_goal: reduce_churn
          relationship_stage: loyalty_member

      professional_services:
        semantics: |
          Service-based business (consulting, legal, accounting).
          Expertise emphasis, relationship-driven.
        signals:
          - Expertise/credential focus
          - Service descriptions
          - Consultation offers
          - Professional terminology
          - Team/partner highlights
        counter_signals:
          - Product catalog
          - E-commerce CTAs
          - Software features
        examples:
          - Consultation invitation
          - Industry insights email
          - Service announcement
          - Team introduction
          - Case result sharing
        typical_correlations:
          tone_of_voice: formal_professional
          email_type: [case_study, educational_content]
          campaign_goal: generate_leads

      agency:
        semantics: |
          Service agency (marketing, creative, development).
          Portfolio/work showcase, client relationship focus.
        signals:
          - Portfolio pieces
          - Client work examples
          - Agency services
          - Team capabilities
          - Industry awards
        counter_signals:
          - Product sales
          - Consumer marketing
          - Subscription model
        examples:
          - Agency newsletter
          - Case study share
          - New capability announcement
          - Award notification
          - Thought leadership
        typical_correlations:
          email_type: [case_study, newsletter]
          body_sections: [portfolio_gallery]

      franchise:
        semantics: |
          Franchise business model with local operators.
          Brand + location messaging, local relevance.
        signals:
          - Location references
          - Franchise branding
          - Local owner mentions
          - Corporate + local mix
          - Regional promotions
        counter_signals:
          - Single location only
          - Online-only
          - No location context
        examples:
          - Local franchise promotion
          - New location announcement
          - Regional offer
          - Franchisee spotlight
          - Local event invite
        typical_correlations:
          body_sections: [map_embed]

      nonprofit:
        semantics: |
          Nonprofit organization focused on cause/mission.
          Impact-focused, donation-driven, volunteer engagement.
        signals:
          - Mission messaging
          - Donation CTAs
          - Impact metrics
          - Volunteer opportunities
          - Cause language
        counter_signals:
          - Profit messaging
          - Product sales focus
          - Commercial enterprise
        examples:
          - Donation appeal
          - Impact report
          - Volunteer call
          - Cause update
          - Annual report email
        typical_correlations:
          campaign_goal: nurture_relationships
          tone_of_voice: empathetic_understanding
          body_sections: [statistics_metrics]

      government:
        semantics: |
          Government agency or public sector organization.
          Service information, compliance focus, official tone.
        signals:
          - Official government language
          - Public service information
          - Regulatory content
          - Citizen focus
          - Official branding
        counter_signals:
          - Commercial promotion
          - Sales messaging
          - Private company branding
        examples:
          - Service notification
          - Regulatory update
          - Citizen alert
          - Public program info
          - Government newsletter
        typical_correlations:
          tone_of_voice: formal_professional
          design_aesthetic: corporate_professional

      education:
        semantics: |
          Educational institution or learning platform.
          Learning outcomes, enrollment, student engagement.
        signals:
          - Course/program content
          - Academic terminology
          - Enrollment CTAs
          - Learning outcomes
          - Student focus
        counter_signals:
          - Product sales
          - Non-educational content
          - Commercial focus
        examples:
          - Course announcement
          - Enrollment reminder
          - Student newsletter
          - Program update
          - Learning milestone
        typical_correlations:
          campaign_goal: educate_audience
          email_type: [educational_content, onboarding]

      creator:
        semantics: |
          Individual creator/influencer monetizing personal brand.
          Personal voice, community focus, multi-channel.
        signals:
          - Personal voice/name
          - Creator-specific content
          - Community language
          - Multi-platform references
          - Personal story
        counter_signals:
          - Corporate branding
          - Team/company focus
          - Enterprise messaging
        examples:
          - Creator newsletter
          - Product launch (creator)
          - Personal update
          - Course/content promotion
          - Community call
        typical_correlations:
          tone_of_voice: casual_conversational
          email_type: [newsletter, ceo_letter]
          footer_style: [with_personal_signature]

  # ==========================================================================
  # DIMENSION 6: BRAND PERSONALITY
  # ==========================================================================

  brand_personality:
    id: 6
    category: 2
    value_type: single

    definition: |
      The consistent personality archetype the brand embodies.
      This is WHO the brand is - a stable trait that remains constant
      across all communications. Distinct from tone_of_voice which is
      HOW the brand communicates in specific emails.

    question: What is the brand's personality archetype?

    classification_signals:
      - Visual design patterns
      - Vocabulary and phrasing choices
      - Content topics and focus areas
      - Value propositions emphasized
      - Brand story elements

    generation_guidance: |
      Brand personality constrains the range of acceptable tones.
      A "luxurious_premium" brand can't suddenly be "playful_fun."
      Use personality to filter tone_of_voice options and ensure
      consistency across generated emails.

    correlations:
      strong:
        - tone_of_voice: Personality constrains tone options
        - design_aesthetic: Personality drives design choices
        - typography_style: Personality influences type choices
      moderate:
        - market_position: Premium brands have premium personalities
        - color_palette: Personality influences color selection
        - copy_length: Some personalities favor brevity/verbosity

    value_count: 15

    values:
      expert_authoritative:
        semantics: |
          Brand positioned as industry expert and thought leader.
          Emphasizes knowledge, credibility, and expertise.
        signals:
          - Data and research citations
          - Expert credentials
          - Educational content focus
          - Industry thought leadership
          - Professional achievements
        counter_signals:
          - Casual/playful language
          - Entertainment focus
          - Self-deprecating humor
        examples:
          - McKinsey consulting emails
          - Harvard Business Review
          - Mayo Clinic communications
          - Bloomberg financial updates
          - Gartner research alerts
        typical_correlations:
          tone_of_voice: [formal_professional, educational_instructive]
          design_aesthetic: corporate_professional
          typography_style: classic_serif, modern_sans
          copy_length: detailed

      friendly_approachable:
        semantics: |
          Warm, welcoming brand that feels like a friend.
          Accessible, helpful, relatable personality.
        signals:
          - Casual, warm language
          - First-person/conversational
          - Helpful, supportive content
          - Personal touches
          - Community feeling
        counter_signals:
          - Formal/stiff language
          - Distant/corporate tone
          - Luxury positioning
        examples:
          - Mailchimp emails
          - Trader Joe's Fearless Flyer
          - Zappos customer emails
          - Chewy pet care emails
          - Southwest Airlines updates
        typical_correlations:
          tone_of_voice: [friendly_warm, casual_conversational]
          design_aesthetic: playful_fun, modern
          typography_style: humanist_sans

      innovative_cutting_edge:
        semantics: |
          Brand at the forefront of innovation and technology.
          Forward-thinking, modern, progressive.
        signals:
          - "New, first, breakthrough language"
          - Tech/innovation focus
          - Future-oriented messaging
          - Beta/early access offers
          - Cutting-edge imagery
        counter_signals:
          - Traditional values
          - Heritage emphasis
          - Conservative approach
        examples:
          - Tesla product announcements
          - Apple launch emails
          - SpaceX updates
          - OpenAI communications
          - Stripe developer emails
        typical_correlations:
          tone_of_voice: [excited_enthusiastic]
          design_aesthetic: tech_futuristic, modern
          typography_style: geometric_sans

      luxurious_premium:
        semantics: |
          High-end, exclusive brand for discerning customers.
          Quality, craftsmanship, exclusivity emphasis.
        signals:
          - Quality/craftsmanship focus
          - Exclusive/limited messaging
          - Premium pricing implied
          - Refined language
          - Aspirational imagery
        counter_signals:
          - Discount/sale focus
          - Budget messaging
          - Mass market appeal
        examples:
          - Louis Vuitton emails
          - Ritz-Carlton communications
          - Rolex updates
          - Net-a-Porter
          - Aesop skincare emails
        typical_correlations:
          tone_of_voice: [exclusive_vip]
          design_aesthetic: elegant_sophisticated, luxurious_premium
          market_position: luxury, premium
          typography_style: elegant_thin

      adventurous_bold:
        semantics: |
          Brand for explorers, risk-takers, and thrill-seekers.
          Encourages pushing boundaries and trying new things.
        signals:
          - Action/adventure imagery
          - Challenge/achievement language
          - Outdoor/extreme content
          - Bold visual design
          - Inspirational calls to action
        counter_signals:
          - Safe/conservative messaging
          - Routine/comfort focus
          - Risk-averse language
        examples:
          - Red Bull emails
          - Patagonia adventures
          - GoPro content
          - REI outdoor emails
          - Jeep communications
        typical_correlations:
          tone_of_voice: [excited_enthusiastic, inspiring_motivational]
          design_aesthetic: bold_dramatic
          color_palette: [high_contrast]

      caring_nurturing:
        semantics: |
          Brand focused on care, support, and wellbeing.
          Empathetic, supportive, protective personality.
        signals:
          - Care/support language
          - Wellbeing focus
          - Gentle, nurturing tone
          - Safety/security messaging
          - Health/wellness content
        counter_signals:
          - Aggressive sales tactics
          - Pressure messaging
          - Edgy/bold content
        examples:
          - Pampers parent emails
          - Headspace mindfulness
          - Calm app communications
          - Johnson & Johnson family
          - Gerber baby emails
        typical_correlations:
          tone_of_voice: [empathetic_understanding, calm_reassuring]
          design_aesthetic: warm_cozy, nature_organic
          color_palette: [soft_pastels]

      playful_fun:
        semantics: |
          Brand that doesn't take itself too seriously.
          Entertaining, lighthearted, enjoyable experience.
        signals:
          - Humor and wit
          - Playful language/puns
          - Fun visuals
          - Game/entertainment elements
          - Light-hearted content
        counter_signals:
          - Serious/formal tone
          - Corporate stiffness
          - Heavy content
        examples:
          - Dollar Shave Club emails
          - BarkBox pet communications
          - Chubbies shorts emails
          - Cards Against Humanity
          - Old Spice marketing
        typical_correlations:
          tone_of_voice: [playful_fun, witty_clever]
          design_aesthetic: playful_fun
          typography_style: display_decorative

      trustworthy_reliable:
        semantics: |
          Brand built on trust, dependability, and consistency.
          Safe choice, proven track record, reliable service.
        signals:
          - Trust signals (certifications, reviews)
          - Consistency messaging
          - Reliability guarantees
          - Track record references
          - Security/safety emphasis
        counter_signals:
          - Experimental messaging
          - Risk-taking encouragement
          - Unproven claims
        examples:
          - USAA member emails
          - Allstate insurance
          - Consumer Reports
          - Vanguard investing
          - AAA member communications
        typical_correlations:
          tone_of_voice: [serious_informative, calm_reassuring]
          design_aesthetic: corporate_professional, classic_traditional
          body_sections: [trust_certifications]

      professional_polished:
        semantics: |
          Sophisticated, refined, business-appropriate brand.
          High standards, attention to detail, premium execution.
        signals:
          - Polished design
          - Professional language
          - Business context
          - Quality indicators
          - Premium execution
        counter_signals:
          - Casual/sloppy execution
          - Playful language
          - Mass market feel
        examples:
          - Four Seasons hospitality
          - J.Crew style emails
          - Nordstrom communications
          - American Express
          - United Business Class
        typical_correlations:
          tone_of_voice: [formal_professional]
          design_aesthetic: elegant_sophisticated
          visual_density: sparse, balanced

      quirky_unconventional:
        semantics: |
          Brand that stands out by being different.
          Unique perspective, unexpected approach, distinctive voice.
        signals:
          - Unusual/unexpected content
          - Distinctive voice
          - Non-traditional approach
          - Surprise elements
          - Anti-establishment messaging
        counter_signals:
          - Following conventions
          - Corporate speak
          - Expected patterns
        examples:
          - Oatly milk emails
          - Who Gives A Crap
          - Liquid Death water
          - Glossier beauty
          - Barkbox unusual themes
        typical_correlations:
          tone_of_voice: [witty_clever, playful_fun]
          design_aesthetic: bold_dramatic

      community_inclusive:
        semantics: |
          Brand centered on belonging and community.
          Inclusive, welcoming, brings people together.
        signals:
          - Community language
          - Belonging messaging
          - User-generated content
          - Diversity emphasis
          - Group/collective focus
        counter_signals:
          - Exclusive/elite messaging
          - Individual focus only
          - Competitive positioning
        examples:
          - Peloton community emails
          - Airbnb host community
          - Strava athlete emails
          - Nike running community
          - Bumble user updates
        typical_correlations:
          tone_of_voice: [friendly_warm]
          body_sections: [ugc_gallery, customer_photos]
          campaign_goal: drive_social_engagement

      inspirational_motivating:
        semantics: |
          Brand that inspires and motivates action.
          Aspirational, empowering, encourages growth.
        signals:
          - Inspirational language
          - Achievement focus
          - Empowerment messaging
