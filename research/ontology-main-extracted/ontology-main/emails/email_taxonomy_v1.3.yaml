  # ==========================================================================
  # DIMENSION 9: AUDIENCE LIFE STAGE
  # ==========================================================================

  audience_life_stage:
    id: 9
    category: 3
    value_type: hierarchical

    definition: |
      The recipient's current life stage, split into primary stage (L1) and
      situational modifiers (L2). L1 is mutually exclusive; L2 can have multiple values.
      Independent from age - a 25-year-old can be a new parent.
      Determines relevant products, messaging themes, and pain points.

    question: What life stage is the target audience?

    classification_signals:
      - Product/service category
      - Life event references
      - Lifestyle imagery
      - Needs and pain points addressed
      - Financial context
      - Relationship status
      - Housing situation

    generation_guidance: |
      Life stage determines relevant products, concerns, and messaging.
      Use L1 for primary career stage, then apply L2 situational/lifestyle modifiers.
      L2 values can combine for nuanced targeting (e.g., mid_career + parent + homeowner).

    correlations:
      strong:
        - industry: Life stage determines relevant industries
        - email_type: Some types align with life stages
        - campaign_goal: Goals vary by life stage
      moderate:
        - audience_age_group: Life stage roughly correlates with age
        - copy_length: Different attention/time availability
        - tone_of_voice: Appropriate formality varies

    l1_primary_stages:
      student:
        semantics: |
          Currently enrolled in educational institution.
          Budget-conscious, learning-focused, future-oriented.
        signals:
          - Student discounts
          - Educational content
          - Campus references
          - Budget-friendly offers
          - Career preparation
        counter_signals:
          - Retirement content
          - Home ownership focus
          - Family/parenting content
        examples:
          - Spotify student plans
          - Apple education store
          - Chegg study resources
          - Student bank accounts
          - Amazon Prime Student
        typical_correlations:
          market_position: budget, value
          campaign_goal: drive_signups

      early_career:
        semantics: |
          0-10 years in workforce, building career.
          Career-focused, establishing professional identity, income growth.
          Includes recent graduates through early mid-level professionals.
        signals:
          - "First job, entry-level, career growth"
          - Career advancement content
          - Professional development
          - Networking emphasis
          - Income building
        counter_signals:
          - Retirement planning
          - Senior/executive content
          - Legacy focus
        examples:
          - Professional clothing retailers
          - Career coaching services
          - Entry-level financial products
          - LinkedIn learning
          - Young professional networking
        typical_correlations:
          audience_profession: entry_level, mid_level
          campaign_goal: educate_audience

      mid_career:
        semantics: |
          10-25 years experience, established professional.
          Financial stability achieved, quality-focused, time-poor.
          Senior manager to director level positions.
        signals:
          - Premium services
          - Time-saving emphasis
          - Quality over price
          - Executive content
          - Leadership/management
        counter_signals:
          - Entry-level content
          - Budget focus
          - Student messaging
        examples:
          - Executive services
          - Premium travel
          - Wealth management
          - Leadership development
          - High-end hospitality
        typical_correlations:
          audience_profession: senior_manager
          market_position: premium, luxury
          brand_personality: professional_polished

      late_career:
        semantics: |
          25+ years experience, senior positions.
