  # ==========================================================================
  # DIMENSION 33: PREHEADER STRATEGY
  # ==========================================================================

  preheader_strategy:
    id: 33
    category: 8
    value_type: single

    definition: |
      The strategy for the preheader text (preview text).
      Appears after subject in inbox, affects open rates.

    question: What preheader strategy is used?

    classification_signals:
      - Preheader content type
      - Relationship to subject
      - Length and style
      - CTA preview

    generation_guidance: |
      Preheader should complement subject line.
      Use strategy based on email_type and
      campaign_goal. 40-100 characters optimal.

    correlations:
      strong:
        - email_type: Type influences preheader approach
        - urgency_level: Urgency can extend to preheader
        - campaign_goal: Goal affects preview messaging
      moderate:
        - tone_of_voice: Tone carries to preheader

    value_count: 7

    values:
      summary:
        semantics: |
          Summarizes email content.
          What the email contains.
        signals:
          - Content summary
          - "Inside or \"In this email\""
          - Overview text
        examples:
          - "Inside: New arrivals, sale items, and more"
          - "This week's top stories and updates"

      teaser:
        semantics: |
          Teases content without revealing.
          Creates curiosity.
        signals:
          - Curiosity language
          - Incomplete thoughts
          - Mystery elements
        examples:
          - "You won't believe what's inside..."
          - "The secret to [benefit]"

      cta_preview:
        semantics: |
