  # ==========================================================================
  # DIMENSION 31: MOBILE OPTIMIZATION
  # ==========================================================================

  mobile_optimization:
    id: 31
    category: 8
    value_type: single

    definition: |
      How the email is optimized for mobile devices.
      Critical as 50%+ of email opens are on mobile.

    question: How is the email optimized for mobile?

    classification_signals:
      - Layout behavior on mobile
      - Touch-friendly elements
      - Text sizing
      - Image scaling
      - CTA button sizing

    generation_guidance: |
      Most emails should be mobile-first or responsive.
      Match mobile strategy to audience_age_group and
      reading context expectations.

    correlations:
      strong:
        - layout_structure: Structure affects responsiveness
        - audience_age_group: Younger = more mobile
        - visual_density: Density affects mobile experience
      moderate:
        - cta_style: Mobile needs larger CTAs
        - typography_style: Mobile needs legible type

    value_count: 5

    values:
      mobile_first:
        semantics: |
          Designed for mobile, scales to desktop.
          Mobile is primary experience.
        signals:
          - Single column
          - Large touch targets
          - Big text
          - Mobile-prioritized images
        examples:
          - Modern e-commerce
          - App-based brands
          - Younger audience targeting
          - Mobile-heavy segments
        typical_correlations:
          layout_structure: single_column
          audience_age_group: gen_z, millennial

      responsive:
        semantics: |
          Adapts to screen size.
          Fluid layout, breakpoints.
        signals:
          - Fluid width
          - Stacking columns
          - Flexible images
          - Breakpoint behavior
        examples:
          - Most modern marketing
          - Standard practice
          - Professional emails
          - Balanced approach
        typical_correlations:
          layout_structure: [two_column_equal]

      desktop_primary:
        semantics: |
          Optimized for desktop, acceptable on mobile.
          Desktop is primary consideration.
        signals:
          - Multi-column on mobile
          - Smaller elements
          - Desktop-focused design
          - May require zoom
        examples:
          - B2B enterprise
          - Complex content
          - Data-heavy emails
          - Desktop-heavy audiences
        typical_correlations:
          business_model: b2b
          audience_profession: c_suite

      hybrid_spongy:
        semantics: |
          Hybrid approach using spongy design.
          Works without media queries.
        signals:
          - Fluid tables
          - No media queries
          - Graceful degradation
          - Wide compatibility
        examples:
          - Email client compatibility focus
          - Outlook optimization
          - Enterprise environments
          - Maximum compatibility

      mobile_only:
        semantics: |
          Only designed for mobile.
          Not optimized for desktop at all.
        signals:
          - Narrow fixed width
          - Small on desktop
          - Touch-only design
          - Mobile-exclusive
        examples:
          - SMS-like notifications
          - App notifications
          - Minimal transactional
        typical_correlations:
          layout_structure: single_column_narrow

