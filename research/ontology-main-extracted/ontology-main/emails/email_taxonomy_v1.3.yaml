  # ==========================================================================
  # DIMENSION 15: LAYOUT STRUCTURE
  # ==========================================================================

  layout_structure:
    id: 15
    category: 4
    value_type: single

    definition: |
      The structural arrangement and organization of email content.
      Determines how content flows and is consumed.
      Critical for scannability and information hierarchy.

    question: What is the email's layout structure?

    classification_signals:
      - Column count and arrangement
      - Grid presence and type
      - Content flow pattern
      - Section organization
      - Visual hierarchy
      - Hero treatment

    generation_guidance: |
      Layout structure depends on email_type and content volume.
      Product emails need grids; newsletters need multiple columns;
      transactional can be single column. Match structure to purpose.

    correlations:
      strong:
        - email_type: Type determines appropriate structures
        - body_sections: Layout accommodates section types
        - visual_density: Structure affects perceived density
      moderate:
        - mobile_optimization: Structure affects responsiveness
        - copy_length: Layout must accommodate content length
        - image_text_ratio: Structure influences ratio

    value_count: 47
    
    note: |
      Due to complexity, only key layout structures detailed.
      Full value list in email_taxonomy_v1.yaml.

    l1_categories:
      - id: column_based
        name: Column-Based Layouts
        values: [single_column, single_column_narrow, single_column_wide, 
                 two_column_equal, two_column_asymmetric, two_column_sidebar,
                 three_column, four_column]
        typical_use: Most email types, mobile-friendly

      - id: grid_layouts
        name: Grid Layouts
        values: [product_grid_small, product_grid_medium, product_grid_large,
                 card_grid, masonry_grid, icon_grid]
        typical_use: E-commerce, product showcases

      - id: pattern_layouts
        name: Pattern Layouts
        values: [f_pattern, z_pattern, inverted_pyramid, zigzag_alternating]
        typical_use: Long-form content, storytelling

      - id: hero_focused
        name: Hero-Focused Layouts
        values: [hero_fullwidth, hero_split, hero_minimal, hero_video,
                 hero_floating_card]
        typical_use: Promotional, announcements

      - id: content_specific
        name: Content-Specific Layouts
        values: [newsletter_digest, blog_article, magazine_editorial,
                 story_narrative]
        typical_use: Content/editorial emails

      - id: functional
        name: Functional Layouts
        values: [pricing_table, comparison_table, faq_accordion,
                 step_process, timeline, infographic]
        typical_use: Informational, comparison emails

      - id: transactional
        name: Transactional Layouts
        values: [receipt_invoice, ticket_confirmation, event_agenda]
        typical_use: Transactional emails

    values:
      single_column:
        semantics: |
          Single central column, most mobile-friendly.
          Content stacks vertically, easy to scan.
        signals:
          - One content column
          - Stacked sections
          - Centered layout
          - Vertical flow
        counter_signals:
          - Side-by-side content
          - Multiple columns
          - Complex grid
        examples:
          - Most transactional emails
          - Simple promotional
          - Welcome emails
          - Text-focused newsletters
          - Mobile-first design
        typical_correlations:
          mobile_optimization: mobile_first
          email_type: [welcome, order_confirmation]

      product_grid_medium:
        semantics: |
          2-3 products per row, balanced size and detail.
          Common e-commerce layout.
        signals:
          - 2-3 products per row
          - Consistent sizing
          - Grid alignment
          - Product cards
        counter_signals:
          - Single product
          - List format
          - No product imagery
        examples:
          - E-commerce new arrivals
          - Category promotions
          - Sale roundups
          - Product recommendations
          - Collection emails
        typical_correlations:
          email_type: [new_arrival, flash_sale]
          body_sections: [product_grid]
          campaign_goal: drive_purchase

      newsletter_digest:
        semantics: |
          Multi-story format with content previews.
          Magazine-style organization.
        signals:
          - Multiple content blocks
          - Story previews
          - Read more links
          - Organized sections
        counter_signals:
          - Single focus
          - Product-only
          - Simple layout
        examples:
          - Weekly newsletters
          - Content digests
          - Blog roundups
          - News updates
          - Media publications
        typical_correlations:
          email_type: [newsletter, content_digest]
          design_aesthetic: editorial_magazine

      hero_fullwidth:
        semantics: |
          Full-width hero image dominating top section.
          Impact-focused, visual-first.
        signals:
          - Edge-to-edge hero
          - Large imagery
          - Overlaid text
          - Visual impact
        counter_signals:
          - No hero section
          - Small imagery
          - Text-only top
        examples:
          - Product launches
          - Brand campaigns
          - Promotional emails
          - Event invitations
          - Season campaigns
        typical_correlations:
          email_type: [product_launch, flash_sale]
          hero_treatment: fullwidth_image

  # ==========================================================================
  # DIMENSION 16: VISUAL DENSITY
  # ==========================================================================

  visual_density:
    id: 16
    category: 4
    value_type: single

    definition: |
      The amount of visual content packed into the email space.
      Affects perceived complexity, scan-ability, and cognitive load.

    question: How dense is the visual content?

    classification_signals:
      - White space ratio
      - Element count per section
      - Content per scroll
      - Overall visual weight
      - Breathing room

    generation_guidance: |
      Density should match brand_personality and content needs.
      Premium brands favor sparse; promotional can be content-rich.
      Match density to audience tolerance.

    correlations:
      strong:
        - design_aesthetic: Aesthetic implies density level
        - market_position: Premium often sparser
        - copy_length: Density and length should align
      moderate:
        - brand_personality: Personality influences density
        - layout_structure: Structure affects density
        - email_type: Type determines expected density

    value_count: 5

    values:
      ultra_minimal:
        semantics: |
          Maximum white space, absolute minimum content.
          One focus per view, extreme simplicity.
        signals:
          - 80%+ white space
          - Single focal point
          - Minimal text
          - Few elements
          - Maximum breathing room
        counter_signals:
          - Multiple products
          - Text-heavy
          - Packed layout
        examples:
          - Luxury brand emails
          - Simple transactional
          - Single CTA emails
          - Minimalist brands
          - Teaser emails
        typical_correlations:
          design_aesthetic: minimalist, luxurious_premium
          market_position: luxury
          copy_length: ultra_short

      sparse:
        semantics: |
          Generous white space, restrained content.
          Comfortable reading, clear hierarchy.
        signals:
          - Generous spacing
          - Clear sections
          - Limited products
          - Comfortable reading
          - Room to breathe
        counter_signals:
          - Packed sections
          - Many CTAs
          - Dense text
        examples:
          - Premium retail
          - Professional services
          - SaaS updates
          - Clean promotional
          - Editorial emails
        typical_correlations:
          design_aesthetic: elegant_sophisticated
          market_position: premium
          copy_length: brief

      balanced:
        semantics: |
          Moderate density, good content-to-space ratio.
          Standard email density, comfortable.
        signals:
          - Balanced spacing
          - Moderate content
          - Standard sections
          - Readable flow
          - Neither empty nor packed
        counter_signals:
          - Extreme white space
          - Very packed content
        examples:
          - Standard newsletters
          - Typical promotional
          - Regular updates
          - E-commerce standard
          - Most marketing emails
        typical_correlations:
          design_aesthetic: modern
          copy_length: moderate

      content_rich:
        semantics: |
          High content volume, reduced white space.
          Information-dense but organized.
        signals:
          - Multiple sections
          - Many elements
          - Reduced spacing
          - Information-rich
          - Packed but organized
        counter_signals:
          - Sparse layout
          - Single focus
          - Lots of white space
        examples:
          - Sale roundups
          - Newsletters
          - Digest emails
          - Product catalogs
          - Event agendas
        typical_correlations:
          email_type: [newsletter, flash_sale]
          layout_structure: newsletter_digest

      dense:
        semantics: |
          Maximum content per scroll, minimal white space.
          Catalog-style, information-heavy.
        signals:
          - Minimal white space
          - Maximum products
          - Tight spacing
          - Catalog-like
          - Information overload risk
        counter_signals:
          - Any significant spacing
          - Breathing room
          - Minimalist approach
        examples:
          - Flash sale catalogs
          - Deal roundups
          - Clearance emails
          - Coupon-heavy promotions
          - Dense product emails
        typical_correlations:
          email_type: [clearance_sale]
          market_position: budget, value
          urgency_level: high

