          - "Exciting news from [Company]"
          - "A message from our CEO"
          - "Big announcement: [News]"
          - "[Company] is joining [Partner]"
        typical_correlations:
          campaign_goal: build_brand_awareness, announce_news
          tone_of_voice: formal_professional

      company_update:
        semantics: |
          General company news or updates, less major than announcement.
          Keeping customers informed.
        signals:
          - Company news or changes
          - Policy updates
          - Team changes
          - Operational updates
          - "What's new at [Company]"
        counter_signals:
          - Major announcement
          - Product-specific
          - Promotional
        examples:
          - "Updates from [Company]"
          - "Changes to our [policy/service]"
          - "What's new this month"
          - "A quick update for you"
          - "News from the team"
        typical_correlations:
          campaign_goal: announce_news
          tone_of_voice: friendly_warm

      ceo_letter:
        semantics: |
          Personal communication from CEO or founder.
