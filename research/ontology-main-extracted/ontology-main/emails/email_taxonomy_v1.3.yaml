      content freshness expectations. Behavioral triggers
      should feel responsive; broadcast should feel crafted.

    correlations:
      strong:
        - email_type: Type implies trigger
        - personalization_level: Triggered = more personal
        - send_frequency: Trigger determines frequency
      moderate:
        - urgency_level: Behavioral allows urgency
        - campaign_goal: Goal influences trigger choice

    value_count: 5

    values:
      transactional:
        semantics: |
          Triggered by completed transaction.
