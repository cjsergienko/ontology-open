# ============================================================================
# HIRING INTERVIEW TAXONOMY v1.0 - QUESTION GENERATION
# ============================================================================
# Comprehensive taxonomy for interview question generation and assessment
# Based on structured interviews research and best practices
# ============================================================================

metadata:
  version: "1.0"
  name: Hiring Interview Taxonomy
  description: |
    Taxonomy for generating and assessing interview questions:
    - QUESTION GENERATION: Create role-specific questions from JD requirements
    - CV-INFORMED: Customize questions based on candidate profiles
    - SCORING: Provide consistent rubrics for evaluation
    - FEEDBACK: Learn which questions differentiate candidates
  created: "2026-02-04"
  status: production_ready

  statistics:
    question_categories: 8
    question_types: 25
    rubric_templates: 40
    assessment_dimensions: 12

  research_basis:
    - source: "Journal of Applied Psychology"
      finding: "Structured interviews have 0.51-0.70 validity vs 0.24 for unstructured"
    - source: "Google re:Work"
      finding: "Four elements: vetted questions, standardized rubrics, interviewer training, job analysis"
    - source: "Hartwell 2019"
      finding: "Past behavioral and background questions most predictive of performance and turnover"

# ============================================================================
# INTERVIEW STRUCTURE
# ============================================================================

interview_structure:
  description: |
    Standard interview process structure by role level.
    Each round has specific purpose and question types.

  rounds:
    recruiter_screen:
      purpose: Initial fit assessment and logistics
      duration_minutes: 15-30
      question_types: [logistics, motivation, basic_qualification]
      typical_questions: 3-5
      decision: proceed_or_reject

    hiring_manager_screen:
      purpose: Experience relevance and team fit
      duration_minutes: 30-45
      question_types: [experience_overview, motivation, role_specific]
      typical_questions: 5-8
      decision: proceed_or_reject

    technical_screen:
      purpose: Basic technical competency
      duration_minutes: 45-60
      question_types: [technical_verification, problem_solving]
      typical_questions: 3-5
      decision: proceed_reject_or_level_adjust

    technical_deep_dive:
      purpose: In-depth technical assessment
      duration_minutes: 60-90
      question_types: [system_design, coding, domain_expertise]
      typical_questions: 2-4
      decision: hire_recommendation

    behavioral:
      purpose: Soft skills and values alignment
      duration_minutes: 45-60
      question_types: [behavioral_star, situational, values]
      typical_questions: 5-7
      decision: hire_recommendation

    presentation:
      purpose: Communication and depth assessment
      duration_minutes: 45-60
      question_types: [presentation, q_and_a]
      typical_questions: discussion_based
      decision: hire_recommendation

    executive:
      purpose: Leadership and strategic fit
      duration_minutes: 30-45
      question_types: [vision, leadership, culture]
      typical_questions: 4-6
      decision: final_approval

  round_templates_by_level:
    entry:
      - recruiter_screen
      - hiring_manager_screen
      - technical_screen
      - behavioral

    mid:
      - recruiter_screen
      - hiring_manager_screen
      - technical_screen
      - technical_deep_dive
      - behavioral

    senior:
      - recruiter_screen
      - hiring_manager_screen
      - technical_deep_dive
      - system_design
      - behavioral
      - team_meet

    staff_plus:
      - recruiter_screen
      - hiring_manager_screen
      - technical_deep_dive
      - system_design
      - behavioral
      - executive

    director_plus:
      - recruiter_screen
      - hiring_manager_screen
      - presentation
      - behavioral
      - executive
      - board_or_ceo

# ============================================================================
# QUESTION CATEGORIES
# ============================================================================

question_categories:

  # ==========================================================================
  # 1. TECHNICAL VERIFICATION
  # ==========================================================================

  technical_verification:
    id: 1
    name: Technical Verification
    description: |
      Questions that verify claimed technical skills from CV/JD.
      Direct assessment of stated competencies.

    purpose: Confirm candidate has claimed technical abilities
    when_to_use: "When SRO lists specific skills as essential"
    typical_count: 2-4 per interview

    question_types:

      skill_assessment:
        description: Direct questions about specific technical skills
        template: "Walk me through how you would [task] using [skill]"
        examples:
          - question: "Explain your approach to optimizing a SQL query with multiple joins on large tables"
            skill: sql
            proficiency_target: 4
          - question: "How would you implement caching in a distributed system?"
            skill: distributed_systems
            proficiency_target: 4
          - question: "Describe your experience with Kubernetes deployment strategies"
            skill: kubernetes
            proficiency_target: 3

      tool_proficiency:
        description: Assessment of tool/platform knowledge
        template: "How have you used [tool] in production?"
        examples:
          - question: "Describe how you've used dbt for data transformation"
            tool: dbt
            proficiency_target: 3
          - question: "Walk me through setting up a CI/CD pipeline with GitHub Actions"
            tool: github_actions
            proficiency_target: 3

      code_review:
        description: Review and critique code samples
        template: "Review this code and identify issues"
        format: provide_code_sample
        assesses: [code_quality, attention_to_detail, communication]

  # ==========================================================================
  # 2. PROBLEM SOLVING
  # ==========================================================================

  problem_solving:
    id: 2
    name: Problem Solving
    description: |
      Questions that assess analytical and problem-solving abilities.
      Focus on approach and reasoning, not just answers.

    purpose: Evaluate how candidates approach novel problems
    when_to_use: "For roles requiring analytical thinking"
    typical_count: 1-3 per interview

    question_types:

      algorithm:
        description: Data structures and algorithms problems
        template: "Given [problem], design an algorithm to [goal]"
        time_box: 20-45 minutes
        assesses: [cs_fundamentals, problem_decomposition, optimization]
        examples:
          - question: "Design an algorithm to find the k most frequent words in a document"
            difficulty: medium
            concepts: [hash_map, heap, sorting]
          - question: "Given a stream of integers, design a data structure for finding the median"
            difficulty: hard
            concepts: [heap, streaming]

      system_design:
        description: Large-scale system architecture problems
        template: "Design a system that [requirement]"
        time_box: 45-60 minutes
        assesses: [architecture, scalability, trade_offs]
        examples:
          - question: "Design a URL shortener like bit.ly"
            difficulty: medium
            concepts: [hashing, database, caching]
          - question: "Design a real-time analytics pipeline for processing 10M events/second"
            difficulty: hard
            concepts: [streaming, partitioning, consistency]
          - question: "Design a ride-sharing matching system"
            difficulty: hard
            concepts: [geospatial, matching, real_time]

      debugging:
        description: Find and fix issues in code/systems
        template: "This system/code has [problem]. Diagnose and fix it."
        assesses: [debugging, systematic_thinking, root_cause_analysis]

      estimation:
        description: Fermi estimation and back-of-envelope calculations
        template: "Estimate [metric] for [system]"
        assesses: [quantitative_reasoning, assumptions, communication]
        examples:
          - question: "How many requests per second should our API handle?"
          - question: "How much storage do we need for 5 years of user activity?"

  # ==========================================================================
  # 3. BEHAVIORAL (STAR)
  # ==========================================================================

  behavioral:
    id: 3
    name: Behavioral Questions
    description: |
      Past behavior predicts future behavior. STAR format questions
      (Situation, Task, Action, Result) about real experiences.

    purpose: Assess soft skills through demonstrated past behavior
    when_to_use: "Every interview should include behavioral questions"
    typical_count: 3-5 per interview

    question_types:

      leadership:
        description: Questions about leading others
        template: "Tell me about a time when you [leadership action]"
        examples:
          - question: "Tell me about a time you had to lead a project with an unclear scope"
            assesses: [ambiguity_tolerance, leadership, planning]
          - question: "Describe a situation where you had to influence without authority"
            assesses: [influence, communication, collaboration]
          - question: "Tell me about a time you had to give difficult feedback"
            assesses: [feedback, courage, empathy]

      collaboration:
        description: Questions about working with others
        template: "Describe a time when you [collaboration scenario]"
        examples:
          - question: "Tell me about a time you disagreed with a teammate's technical approach"
            assesses: [conflict_resolution, communication, teamwork]
          - question: "Describe your most successful cross-functional collaboration"
            assesses: [stakeholder_management, communication]
          - question: "Tell me about a time you helped a struggling teammate"
            assesses: [empathy, mentoring, teamwork]

      problem_resolution:
        description: Questions about handling challenges
        template: "Tell me about a time when [challenge occurred]"
        examples:
          - question: "Describe the most challenging bug you've debugged"
            assesses: [problem_solving, persistence, technical_depth]
          - question: "Tell me about a project that failed. What happened and what did you learn?"
            assesses: [learning, accountability, growth_mindset]
          - question: "Describe a time you had to deliver under tight deadline pressure"
            assesses: [prioritization, stress_management, execution]

      growth:
        description: Questions about learning and development
        template: "Tell me about a time you [learning scenario]"
        examples:
          - question: "Describe how you learned a new technology or domain"
            assesses: [learning_ability, curiosity, initiative]
          - question: "Tell me about feedback you received that changed your approach"
            assesses: [coachability, self_awareness, growth]

  # ==========================================================================
  # 4. SITUATIONAL
  # ==========================================================================

  situational:
    id: 4
    name: Situational Questions
    description: |
      Hypothetical scenarios that assess judgment and approach.
      "What would you do if..." format.

    purpose: Assess decision-making and judgment in hypothetical scenarios
    when_to_use: "When assessing fit for specific role challenges"
    typical_count: 2-4 per interview

    question_types:

      role_specific:
        description: Scenarios specific to the role
        template: "Imagine you're in this role and [scenario]. What would you do?"
        examples:
          - question: "You discover a critical security vulnerability right before launch. What do you do?"
            assesses: [judgment, prioritization, communication]
          - question: "A key stakeholder wants a feature that contradicts your technical recommendation. How do you handle it?"
            assesses: [stakeholder_management, influence, communication]

      ethical_dilemma:
        description: Scenarios involving ethical considerations
        template: "You're faced with [ethical situation]. How do you approach it?"
        examples:
          - question: "You notice a colleague taking shortcuts that could cause problems later. What do you do?"
            assesses: [integrity, courage, judgment]

      prioritization:
        description: Scenarios requiring trade-off decisions
        template: "You have [competing priorities]. How do you decide what to do?"
        examples:
          - question: "You have three urgent requests from different stakeholders. How do you prioritize?"
            assesses: [prioritization, communication, judgment]

  # ==========================================================================
  # 5. MOTIVATION & FIT
  # ==========================================================================

  motivation_fit:
    id: 5
    name: Motivation & Fit
    description: |
      Questions about career goals, motivations, and alignment
      with role and company.

    purpose: Assess alignment between candidate goals and opportunity
    when_to_use: "Early in process (screen) and late (executive)"
    typical_count: 2-4 per interview

    question_types:

      career_motivation:
        description: Understanding career drivers
        template: "Tell me about [career motivation aspect]"
        examples:
          - question: "Why are you interested in this role?"
            assesses: [motivation, preparation, fit]
          - question: "What's driving your decision to make a change right now?"
            assesses: [motivation, self_awareness]
          - question: "Where do you see yourself in 3-5 years?"
            assesses: [ambition, planning, alignment]

      company_fit:
        description: Alignment with company values and culture
        template: "How do you feel about [company aspect]?"
        examples:
          - question: "What type of work environment do you thrive in?"
            assesses: [self_awareness, cultural_fit]
          - question: "How do you feel about working in a fast-paced, ambiguous environment?"
            assesses: [adaptability, comfort_with_ambiguity]

      role_understanding:
        description: Understanding of role expectations
        template: "What do you understand about [role aspect]?"
        examples:
          - question: "What do you think success looks like in this role after 6 months?"
            assesses: [understanding, expectations, planning]

  # ==========================================================================
  # 6. GAP ASSESSMENT
  # ==========================================================================

  gap_assessment:
    id: 6
    name: Gap Assessment
    description: |
      Questions that probe identified gaps between candidate profile
      and role requirements. Generated from CV analysis.

    purpose: Understand candidate's awareness and mitigation of gaps
    when_to_use: "When CV-informed analysis identifies specific gaps"
    typical_count: 1-3 per interview

    question_types:

      skill_gap:
        description: Probing missing or weak skills
        template: "You haven't worked with [skill]. How would you approach learning it?"
        examples:
          - question: "Your experience is primarily with PostgreSQL. How would you adapt to Snowflake?"
            gap_type: tool_experience
          - question: "You haven't managed people before. How do you envision transitioning to management?"
            gap_type: leadership_experience

      experience_gap:
        description: Probing experience gaps
        template: "You have [X years] but we're looking for [Y years]. Tell me about [compensating factor]"
        examples:
          - question: "You have 3 years of experience. Tell me about a time you operated above your level."
            gap_type: years_experience
          - question: "You haven't worked in fintech. How would you approach learning this domain?"
            gap_type: domain_experience

      context_gap:
        description: Probing different context experience
        template: "Your experience is in [context A]. How would you adapt to [context B]?"
        examples:
          - question: "You've worked at large companies. How would you adapt to a startup environment?"
            gap_type: company_context
          - question: "You've built greenfield systems. How comfortable are you working with legacy code?"
            gap_type: work_type

  # ==========================================================================
  # 7. DIFFERENTIATING
  # ==========================================================================

  differentiating:
    id: 7
    name: Differentiating Questions
    description: |
      Questions designed to separate top candidates from each other.
      Generated from CV-informed analysis of candidate pool variance.

    purpose: Create meaningful separation among qualified candidates
    when_to_use: "When multiple strong candidates need differentiation"
    typical_count: 2-4 per interview

    question_types:

      depth_probe:
        description: Go deep on shared strengths to find variance
        template: "Describe the most [superlative] [skill area] work you've done"
        examples:
          - question: "Describe the most complex data pipeline you've built end-to-end"
            assesses: depth_of_experience
          - question: "What's the hardest technical problem you've solved?"
            assesses: problem_solving_ceiling

      edge_case:
        description: How candidates handle unusual scenarios
        template: "How would you handle [unusual situation]?"
        assesses: adaptability, creativity

      ownership_evidence:
        description: Evidence of end-to-end ownership
        template: "Walk me through something you built from conception to production"
        assesses: ownership, initiative, execution

  # ==========================================================================
  # 8. VALUES & CULTURE
  # ==========================================================================

  values_culture:
    id: 8
    name: Values & Culture
    description: |
      Questions assessing alignment with company values and culture.
      Both direct and behavioral approaches.

    purpose: Ensure cultural add and values alignment
    when_to_use: "Throughout process, especially behavioral round"
    typical_count: 2-3 per interview

    question_types:

      values_demonstration:
        description: Examples of living company values
        template: "Tell me about a time when [value-aligned behavior]"
        examples:
          - question: "Tell me about a time you prioritized user experience over technical elegance"
            value: customer_focus
          - question: "Describe a time you spoke up about something you disagreed with"
            value: candor
          - question: "Tell me about a time you took ownership of something outside your job description"
            value: ownership

      culture_scenarios:
        description: How candidate would handle culture-specific scenarios
        template: "How would you approach [culture-specific situation]?"
        examples:
          - question: "How do you prefer to receive feedback?"
            assesses: feedback_culture_fit
          - question: "How do you balance moving fast with maintaining quality?"
            assesses: velocity_vs_quality_balance

# ============================================================================
# SCORING RUBRICS
# ============================================================================

scoring:
  description: |
    Standardized rubrics for consistent candidate evaluation.
    5-point scale with behavioral anchors.

  scale:
    1:
      label: Strong No
      description: Significant concerns, does not meet requirements
      action: Do not proceed

    2:
      label: No
      description: Below expectations, notable gaps
      action: Do not proceed

    3:
      label: Mixed
      description: Meets some expectations, concerns in others
      action: Discuss with team, possible proceed with caveats

    4:
      label: Yes
      description: Meets or exceeds expectations
      action: Proceed, recommend hire

    5:
      label: Strong Yes
      description: Exceptional, exceeds expectations significantly
      action: Strongly recommend, expedite process

  rubric_templates:

    technical_skill:
      dimension: Technical Proficiency
      anchors:
        1: "Cannot explain basic concepts. Fundamental misunderstandings."
        2: "Understands basics but struggles with application. Needs significant guidance."
        3: "Solid working knowledge. Can apply in typical scenarios."
        4: "Deep expertise. Handles edge cases, can teach others."
        5: "Expert level. Could lead technical direction in this area."

    problem_solving:
      dimension: Problem Solving
      anchors:
        1: "Cannot structure approach. Gets stuck on basic problems."
        2: "Some structure but incomplete. Needs hints to progress."
        3: "Good approach. Solves problem with reasonable efficiency."
        4: "Excellent approach. Considers edge cases, optimizes solution."
        5: "Exceptional. Novel insights, identifies non-obvious solutions."

    communication:
      dimension: Communication
      anchors:
        1: "Unclear, disorganized, difficult to follow."
        2: "Understandable but lacks structure or clarity."
        3: "Clear communication. Explains concepts well."
        4: "Excellent communicator. Adapts to audience, very clear."
        5: "Exceptional. Compelling, persuasive, memorable."

    collaboration:
      dimension: Collaboration
      anchors:
        1: "Dismissive of others, doesn't listen, combative."
        2: "Limited engagement, prefers to work alone."
        3: "Works well with others, open to feedback."
        4: "Strong collaborator. Elevates team, builds consensus."
        5: "Exceptional. Creates psychological safety, multiplies team."

    leadership:
      dimension: Leadership
      anchors:
        1: "No evidence of leadership. Avoids responsibility."
        2: "Limited leadership. Follows rather than leads."
        3: "Shows leadership in own area. Can lead small efforts."
        4: "Strong leader. Inspires others, drives outcomes."
        5: "Exceptional leader. Transforms teams, develops leaders."

    judgment:
      dimension: Judgment
      anchors:
        1: "Poor judgment. Makes decisions without considering impact."
        2: "Inconsistent judgment. Sometimes misses key factors."
        3: "Good judgment. Makes reasonable decisions."
        4: "Excellent judgment. Considers multiple perspectives, trade-offs."
        5: "Exceptional. Consistently makes high-quality decisions under uncertainty."

# ============================================================================
# CV-INFORMED QUESTION GENERATION
# ============================================================================

cv_informed_generation:
  description: |
    Process for generating customized questions based on
    candidate CVs matched against JD requirements.

  inputs:
    sro: Structured Requirement Object from JD
    cpo_list: List of Candidate Profile Objects from CV parsing

  analysis_steps:

    1_common_strengths:
      description: Identify skills all top candidates share
      action: Generate quick verification questions
      rationale: "Don't dwell on what everyone has"

    2_differentiating_factors:
      description: Identify skills where top candidates vary
      action: Generate depth-probing questions
      rationale: "These questions will separate candidates"

    3_individual_gaps:
      description: Identify gaps for each candidate
      action: Generate gap-probing questions
      rationale: "Understand how they'd address weaknesses"

  output_structure:
    baseline_questions:
      description: Ask all candidates
      count: 3-5
      source: common_strengths + core_requirements

    differentiating_questions:
      description: Designed to create variance
      count: 2-4
      source: differentiating_factors

    candidate_specific_questions:
      description: Tailored to individual candidate
      count: 1-2 per candidate
      source: individual_gaps

  example:
    sro_summary: "Senior Data Engineer, SQL/Python required, dbt preferred"
    candidates:
      - name: Sarah
        match: 0.94
        strengths: [sql_5, python_4, dbt_4]
        gaps: [no_fintech_experience]
      - name: Chen
        match: 0.87
        strengths: [sql_4, python_4, dbt_3]
        gaps: [3_years_vs_4_required]
      - name: Mike
        match: 0.78
        strengths: [sql_5, python_3]
        gaps: [no_dbt, python_depth]

    generated_questions:
      baseline:
        - question: "Explain your approach to SQL query optimization"
          rationale: "All candidates claim SQL proficiency, quick verify"
        - question: "Describe a data pipeline you built end-to-end"
          rationale: "Core job requirement"

      differentiating:
        - question: "How do you approach data quality testing in your pipelines?"
          rationale: "Sarah/Chen have dbt, Mike doesn't - will separate them"
        - question: "Walk through implementing a retry mechanism in Python"
          rationale: "Mike's Python is weaker - will reveal depth"

      candidate_specific:
        - candidate: Sarah
          question: "Your experience is in e-commerce. How would you adapt to fintech data?"
        - candidate: Chen
          question: "You have 3 years. Describe work where you operated above your level."
        - candidate: Mike
          question: "You haven't used dbt. How would you approach learning it?"

# ============================================================================
# QUESTION QUALITY METRICS
# ============================================================================

quality_metrics:
  description: |
    Metrics for evaluating question quality.
    Used to improve question templates over time.

  dimensions:

    job_relevance:
      weight: 0.40
      description: How well does question assess JD requirements?
      measurement: skill_coverage / total_requirements

    discrimination_power:
      weight: 0.30
      description: Does question produce score variance across candidates?
      measurement: variance(scores) / max_possible_variance
      good_threshold: "> 0.5"

    bias_resistance:
      weight: 0.20
      description: Is question fair and not biased?
      measurement: bias_indicator_check
      checks:
        - No demographic signals
        - Focus on demonstrated skills
        - No trick questions

    behavioral_anchoring:
      weight: 0.10
      description: Are rubrics clear and well-defined?
      measurement: rubric_completeness

  feedback_loop:
    description: |
      Learn which questions actually work by tracking outcomes.

    tracking:
      - question_id
      - candidate_id
      - score_given
      - hire_decision
      - hire_outcome (if available)

    analysis:
      - Which questions have high score variance?
      - Which questions correlate with hire decisions?
      - Which questions correlate with hire success?

    updates:
      - Upweight high-performing question templates
      - Downweight low-discrimination questions
      - Add company-specific patterns
